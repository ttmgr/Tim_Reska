# =============================================================================
# Disease Progression Modeling -- Default Experiment Configuration
# =============================================================================

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
experiment_name: "default"
random_seed: 42
horizons: [1, 3, 5]           # prediction horizons in years
n_patients: 5000

# ---------------------------------------------------------------------------
# Data splits
# ---------------------------------------------------------------------------
splits:
  train: 0.8
  validation: 0.1              # carved from train set
  test: 0.2

# ---------------------------------------------------------------------------
# Clinical tracks
# ---------------------------------------------------------------------------
tracks:
  - cvd
  - diabetes

# ---------------------------------------------------------------------------
# Feature engineering
# ---------------------------------------------------------------------------
features:
  static:
    - age
    - sex
    - race
    - bmi
    - smoking_status
    - baseline_comorbidity_count
  temporal:
    - diagnoses            # ICD-10 sequences
    - procedures           # CPT / SNOMED sequences
    - medications          # RxNorm sequences
    - lab_results          # LOINC-coded lab values
    - vitals               # blood pressure, heart rate, glucose
  tokenization:
    vocab_size: 30000
    max_sequence_length: 512
    time_embedding: "sinusoidal"   # sinusoidal | learned
    visit_order: "chronological"
  imputation: "forward_fill"       # forward_fill | median | mice

# ---------------------------------------------------------------------------
# Model hyperparameters
# ---------------------------------------------------------------------------
models:
  cox_ph:
    penalizer: 0.01
    l1_ratio: 0.0
    baseline_estimation: "breslow"

  deepsurv:
    hidden_layers: [128, 64, 32]
    dropout: 0.3
    activation: "selu"
    learning_rate: 0.001
    weight_decay: 0.0001
    batch_size: 256
    epochs: 100
    patience: 10               # early stopping patience
    optimizer: "adamw"

  deephit:
    hidden_layers: [128, 128, 64]
    dropout: 0.25
    num_risks: 2               # competing events
    num_durations: 60          # discrete time bins
    alpha: 0.5                 # ranking loss weight
    sigma: 0.1                 # ranking loss bandwidth
    learning_rate: 0.001
    batch_size: 256
    epochs: 100
    patience: 10

  dynamic_deephit:
    rnn_type: "gru"
    rnn_hidden: 64
    rnn_layers: 2
    hidden_layers: [128, 64]
    dropout: 0.3
    num_risks: 2
    num_durations: 60
    learning_rate: 0.0005
    batch_size: 128
    epochs: 100
    patience: 15

  multistate_markov:
    n_states: 5                # track-dependent
    covariates: true
    method: "em"               # em | direct
    max_iter: 500
    tol: 0.0001

  survtrace:
    n_heads: 4
    n_layers: 3
    d_model: 64
    d_ff: 256
    dropout: 0.1
    num_risks: 2
    num_durations: 60
    learning_rate: 0.0001
    weight_decay: 0.00001
    batch_size: 128
    epochs: 100
    patience: 15
    warmup_steps: 500

# ---------------------------------------------------------------------------
# Evaluation
# ---------------------------------------------------------------------------
evaluation:
  metrics:
    - concordance_index
    - time_dependent_auc
    - integrated_brier_score
    - calibration_slope
    - calibration_intercept
  horizons: [1, 3, 5]           # must match top-level horizons
  bootstrap_ci:
    enabled: true
    n_resamples: 1000
    confidence_level: 0.95
  fairness:
    sensitive_attributes: ["sex", "race", "age_group"]
    metrics: ["equalized_odds", "calibration_gap"]

# ---------------------------------------------------------------------------
# Governance
# ---------------------------------------------------------------------------
governance:
  model_card:
    auto_generate: true
    output_dir: "governance/model_cards"
  risk_register: "governance/risk_register.yaml"
  data_sheet: "governance/data_sheet.yaml"
