# ---------------------------------------------------------------
# LABORATORY / OBSERVATIONS (LOINC)
# ---------------------------------------------------------------
observations:
  glycemic_control:
    description: "Glycemic monitoring"
    code_system: "LOINC"
    codes:
      - code: "4548-4"
        display: "Hemoglobin A1c/Hemoglobin.total in Blood"
        unit: "%"
        target_range: "< 7.0"
      - code: "4549-2"
        display: "Hemoglobin A1c/Hemoglobin.total in Blood by Electrophoresis"
        unit: "%"
      - code: "2345-7"
        display: "Glucose [Mass/volume] in Serum or Plasma"
        unit: "mg/dL"
      - code: "1558-6"
        display: "Fasting glucose [Mass/volume] in Serum or Plasma"
        unit: "mg/dL"
      - code: "14771-0"
        display: "Fasting glucose [Mass/volume] in Capillary blood"
        unit: "mg/dL"

  renal_function:
    description: "Renal function monitoring for diabetic nephropathy"
    code_system: "LOINC"
    codes:
      - code: "2160-0"
        display: "Creatinine [Mass/volume] in Serum or Plasma"
        unit: "mg/dL"
      - code: "48642-3"
        display: "eGFR by CKD-EPI creatinine equation"
        unit: "mL/min/1.73m2"
        staging:
          G1: ">= 90"
          G2: "60-89"
          G3a: "45-59"
          G3b: "30-44"
          G4: "15-29"
          G5: "< 15"
      - code: "62238-1"
        display: "eGFR by CKD-EPI creatinine-cystatin C"
        unit: "mL/min/1.73m2"
      - code: "14959-1"
        display: "Microalbumin [Mass/volume] in Urine"
        unit: "mg/L"
      - code: "9318-7"
        display: "Albumin/Creatinine ratio [Mass ratio] in Urine"
        unit: "mg/g"
        staging:
          A1_normal: "< 30"
          A2_moderately_increased: "30-300"
          A3_severely_increased: "> 300"
      - code: "3094-0"
        display: "BUN [Mass/volume] in Serum or Plasma"
        unit: "mg/dL"

  lipid_panel:
    description: "Lipid monitoring for CV risk in diabetes"
    code_system: "LOINC"
    codes:
      - code: "2093-3"
        display: "Total Cholesterol"
        unit: "mg/dL"
      - code: "2085-9"
        display: "HDL Cholesterol"
        unit: "mg/dL"
      - code: "13457-7"
        display: "LDL Cholesterol (calculated)"
        unit: "mg/dL"
      - code: "2571-8"
        display: "Triglycerides"
        unit: "mg/dL"

  liver_function:
    description: "Liver function (relevant for NAFLD/NASH screening)"
    code_system: "LOINC"
    codes:
      - code: "1742-6"
        display: "ALT [Enzymatic activity/volume] in Serum or Plasma"
        unit: "U/L"
      - code: "1920-8"
        display: "AST [Enzymatic activity/volume] in Serum or Plasma"
        unit: "U/L"
      - code: "6768-6"
        display: "Alkaline phosphatase"
        unit: "U/L"

  vitals:
    description: "Vital signs for diabetes management"
    code_system: "LOINC"
    codes:
      - code: "8480-6"
        display: "Systolic blood pressure"
        unit: "mmHg"
      - code: "8462-4"
        display: "Diastolic blood pressure"
        unit: "mmHg"
      - code: "29463-7"
        display: "Body weight"
        unit: "kg"
      - code: "39156-5"
        display: "BMI [Ratio]"
        unit: "kg/m2"

# ---------------------------------------------------------------
# OUTCOME / PROGRESSION DEFINITIONS
# ---------------------------------------------------------------
outcomes:
  glycemic_progression:
    description: >
      Glycemic progression milestones used to define disease states
      in multistate models.
    states:
      - name: "normal_glucose"
        hba1c_range: "< 5.7"
      - name: "prediabetes"
        hba1c_range: "5.7 - 6.4"
      - name: "diabetes_controlled"
        hba1c_range: "6.5 - 7.9"
      - name: "diabetes_uncontrolled"
        hba1c_range: ">= 8.0"

  ckd_progression:
    description: "CKD stage progression (KDIGO)"
    states:
      - name: "G1"
        egfr_range: ">= 90"
      - name: "G2"
        egfr_range: "60 - 89"
      - name: "G3a"
        egfr_range: "45 - 59"
      - name: "G3b"
        egfr_range: "30 - 44"
      - name: "G4"
        egfr_range: "15 - 29"
      - name: "G5"
        egfr_range: "< 15"
      - name: "dialysis_transplant"
        icd10_codes: ["Z99.2", "Z94.0"]

  microvascular_composite:
    description: >
      Composite microvascular endpoint: new or worsening retinopathy,
      nephropathy (doubling of creatinine or ESRD), or neuropathy.
    components:
      - retinopathy:
          icd10_prefix: ["E11.3", "E10.3", "H36.0"]
      - nephropathy:
          icd10_prefix: ["E11.2", "E10.2", "N18"]
      - neuropathy:
          icd10_prefix: ["E11.4", "E10.4", "G63.2"]

  macrovascular_composite:
    description: "MACE in diabetes context"
    components:
      - cv_death:
          description: "Death with I-code underlying cause"
      - nonfatal_mi:
          icd10_codes: ["I21", "I22"]
      - nonfatal_stroke:
          icd10_codes: ["I60", "I61", "I63", "I64"]
