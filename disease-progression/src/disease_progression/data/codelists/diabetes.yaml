# Diabetes Code Lists
# ====================
# Curated ICD-10-CM, ATC, and LOINC codes for diabetes disease
# progression modeling, including micro- and macrovascular complications.
#
# Sources:
#   - ICD-10-CM 2024 (CMS)
#   - ATC/DDD Index 2024 (WHO Collaborating Centre)
#   - LOINC 2.77 (Regenstrief Institute)

metadata:
  track: diabetes
  version: "1.0.0"
  last_updated: "2025-01-15"
  description: >
    Code lists for diabetes mellitus progression including Type 1, Type 2,
    microvascular complications (retinopathy, nephropathy, neuropathy),
    macrovascular complications, and related metabolic monitoring.

