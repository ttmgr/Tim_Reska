# ---------------------------------------------------------------
# OUTCOME DEFINITIONS (composite endpoints)
# ---------------------------------------------------------------
outcomes:
  mace:
    description: >
      Major Adverse Cardiovascular Events (MACE): composite of
      cardiovascular death, non-fatal MI, non-fatal stroke.
    components:
      - cardiovascular_death:
          icd10_prefix: ["I"]
          description: "Death with underlying CVD cause"
      - nonfatal_mi:
          icd10_codes: ["I21", "I22"]
      - nonfatal_stroke:
          icd10_codes: ["I60", "I61", "I63", "I64"]

  heart_failure_hospitalization:
    description: "Heart failure hospitalization (primary discharge diagnosis)"
    icd10_codes: ["I50"]

  mace_plus:
    description: >
      Extended MACE+: MACE plus heart failure hospitalization and
      coronary revascularization.
    components:
      - mace: {}
      - hf_hospitalization:
          icd10_codes: ["I50"]
      - revascularization:
          description: "PCI or CABG (procedure codes)"
