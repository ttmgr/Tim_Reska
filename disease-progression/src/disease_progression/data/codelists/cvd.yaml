# Cardiovascular Disease (CVD) Code Lists
# =========================================
# Curated ICD-10-CM, ATC, and LOINC codes for cardiovascular disease
# progression modeling.  Organised by clinical concept to support
# phenotyping, outcome definition, and covariate extraction.
#
# Sources:
#   - ICD-10-CM 2024 (CMS)
#   - ATC/DDD Index 2024 (WHO Collaborating Centre)
#   - LOINC 2.77 (Regenstrief Institute)

metadata:
  track: cardiovascular
  version: "1.0.0"
  last_updated: "2025-01-15"
  description: >
    Code lists for cardiovascular disease progression including coronary
    heart disease, myocardial infarction, heart failure, stroke, atrial
    fibrillation, and related laboratory / medication concepts.

