<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Tim Reska — Bioinformatician who builds AI systems that know when they're wrong">
  <defs>
    <style>
      .name { font-family: 'Source Serif 4', 'Source Serif Pro', 'Iowan Old Style', Georgia, serif; font-weight: 600; font-size: 132px; fill: #1A1A2E; letter-spacing: -2px; }
      .tagline { font-family: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 400; font-size: 36px; fill: #4A4A52; letter-spacing: -0.2px; }
      .role { font-family: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 500; font-size: 22px; fill: #C4794A; letter-spacing: 4px; text-transform: uppercase; }
      .url { font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace; font-weight: 400; font-size: 20px; fill: #8A8A92; }
    </style>
  </defs>

  <!-- Warm white background -->
  <rect width="1200" height="630" fill="#FAF9F7"/>

  <!-- Top terracotta accent stripe -->
  <rect x="0" y="0" width="1200" height="8" fill="#C4794A"/>

  <!-- Left margin terracotta accent dot -->
  <circle cx="100" cy="315" r="6" fill="#C4794A"/>
  <line x1="100" y1="220" x2="100" y2="295" stroke="#C4794A" stroke-width="2" opacity="0.45"/>
  <line x1="100" y1="335" x2="100" y2="410" stroke="#C4794A" stroke-width="2" opacity="0.45"/>

  <!-- Role label -->
  <text x="150" y="225" class="role">Bioinformatician</text>

  <!-- Name -->
  <text x="150" y="345" class="name">Tim Reska</text>

  <!-- Tagline -->
  <text x="150" y="420" class="tagline">AI systems that know when they're wrong.</text>

  <!-- URL footer -->
  <text x="150" y="555" class="url">ttmgr.github.io/Tim_Reska</text>

  <!-- Bottom-right accent square -->
  <rect x="1060" y="528" width="40" height="40" fill="#C4794A"/>
  <rect x="1060" y="528" width="40" height="40" fill="none" stroke="#1A1A2E" stroke-width="1.5" opacity="0.15"/>
</svg>
