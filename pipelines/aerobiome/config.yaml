# =============================================================================
# Aerobiome Pipeline Configuration
# =============================================================================
# Publication I: Air monitoring by nanopore sequencing
# Reska T, Pozdniakova S, Urban L (ISME Communications, 2024)

# -- Basecalling --------------------------------------------------------------
basecalling:
  model: "dna_r10.4.1_e8.2_400bps_hac@v4.3.0"   # Dorado HAC model


# -- Samples ------------------------------------------------------------------
# ULB air samples from active liquid impingement sampling.
# Sample types: greenhouse (1h, 3h), natural, urban, negative_control
samples:
  # Greenhouse 1-hour sampling (Munich)
  GH_1h_01:
    fastq: "data/raw/GH_1h_01.fastq.gz"
    type: "greenhouse_1h"
    site: "munich_greenhouse"
    subsample_reads: 5000
  GH_1h_02:
    fastq: "data/raw/GH_1h_02.fastq.gz"
    type: "greenhouse_1h"
    site: "munich_greenhouse"
    subsample_reads: 5000
  GH_1h_03:
    fastq: "data/raw/GH_1h_03.fastq.gz"
    type: "greenhouse_1h"
    site: "munich_greenhouse"
    subsample_reads: 5000

  # Greenhouse 3-hour sampling (Munich)
  GH_3h_01:
    fastq: "data/raw/GH_3h_01.fastq.gz"
    type: "greenhouse_3h"
    site: "munich_greenhouse"
    subsample_reads: 15000
  GH_3h_02:
    fastq: "data/raw/GH_3h_02.fastq.gz"
    type: "greenhouse_3h"
    site: "munich_greenhouse"
    subsample_reads: 15000
  GH_3h_03:
    fastq: "data/raw/GH_3h_03.fastq.gz"
    type: "greenhouse_3h"
    site: "munich_greenhouse"
    subsample_reads: 15000

  # Natural environment (Munich)
  NAT_01:
    fastq: "data/raw/NAT_01.fastq.gz"
    type: "natural"
    site: "munich_natural"
    subsample_reads: 70000
  NAT_02:
    fastq: "data/raw/NAT_02.fastq.gz"
    type: "natural"
    site: "munich_natural"
    subsample_reads: 70000
  NAT_03:
    fastq: "data/raw/NAT_03.fastq.gz"
    type: "natural"
    site: "munich_natural"
    subsample_reads: 70000

  # Urban campaign (Barcelona)
  URB_01:
    fastq: "data/raw/URB_01.fastq.gz"
    type: "urban"
    site: "barcelona_urban"
    subsample_reads: 30000
  URB_02:
    fastq: "data/raw/URB_02.fastq.gz"
    type: "urban"
    site: "barcelona_urban"
    subsample_reads: 30000

  # Negative controls
  NTC_01:
    fastq: "data/raw/NTC_01.fastq.gz"
    type: "negative_control"
    site: "control"
    subsample_reads: 0
  EXT_BLANK_01:
    fastq: "data/raw/EXT_BLANK_01.fastq.gz"
    type: "negative_control"
    site: "control"
    subsample_reads: 0


# -- Quality control ----------------------------------------------------------
qc:
  min_quality: 8           # NanoFilt Q threshold
  min_length: 100          # Minimum read length (bp)


# -- Reference databases ------------------------------------------------------
references:
  kraken2_db: "/databases/kraken2/ncbi_nt"           # Full NCBI nt
  diamond_nr_db: "/databases/diamond/nr.dmnd"        # NCBI nr protein


# -- Community analysis -------------------------------------------------------
community:
  rarefaction_range: [5000, 10000, 15000, 30000, 50000, 70000]
  distance_metric: "braycurtis"       # Bray-Curtis dissimilarity
  ordination: "pcoa"                  # Principal Coordinate Analysis
