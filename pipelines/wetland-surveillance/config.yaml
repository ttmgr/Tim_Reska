# =============================================================================
# Wetland Surveillance Pipeline Configuration
# =============================================================================
# Publication II: Multi-omics water surveillance
# Perlas A*, Reska T*, Sánchez-Cano A, et al. (2025)

# -- Basecalling --------------------------------------------------------------
basecalling:
  model: "dna_r10.4.1_e8.2_400bps_sup@v5.0.0"   # Dorado SUP model


# -- Samples ------------------------------------------------------------------
# Passive membrane adsorption sampling from lentic wetland ecosystems.
# Each sample has DNA (shotgun metagenomics) and RNA (virome + AIV WGS),
# plus eDNA amplicon data.
# 12 sites × 2 replicates = 24 samples across DE, FR, ES.
samples:
  DE_anthro_01:
    dna: "data/raw/DE_anthro_01_dna.fastq.gz"
    rna: "data/raw/DE_anthro_01_rna.fastq.gz"
    edna: "data/raw/DE_anthro_01_edna.fastq.gz"
    site: "de_anthropogenic"
    replicate: 1
  DE_anthro_02:
    dna: "data/raw/DE_anthro_02_dna.fastq.gz"
    rna: "data/raw/DE_anthro_02_rna.fastq.gz"
    edna: "data/raw/DE_anthro_02_edna.fastq.gz"
    site: "de_anthropogenic"
    replicate: 2

  DE_nat_01:
    dna: "data/raw/DE_nat_01_dna.fastq.gz"
    rna: "data/raw/DE_nat_01_rna.fastq.gz"
    edna: "data/raw/DE_nat_01_edna.fastq.gz"
    site: "de_natural"
    replicate: 1
  DE_nat_02:
    dna: "data/raw/DE_nat_02_dna.fastq.gz"
    rna: "data/raw/DE_nat_02_rna.fastq.gz"
    edna: "data/raw/DE_nat_02_edna.fastq.gz"
    site: "de_natural"
    replicate: 2

  FR_anthro_01:
    dna: "data/raw/FR_anthro_01_dna.fastq.gz"
    rna: "data/raw/FR_anthro_01_rna.fastq.gz"
    edna: "data/raw/FR_anthro_01_edna.fastq.gz"
    site: "fr_anthropogenic"
    replicate: 1
  FR_anthro_02:
    dna: "data/raw/FR_anthro_02_dna.fastq.gz"
    rna: "data/raw/FR_anthro_02_rna.fastq.gz"
    edna: "data/raw/FR_anthro_02_edna.fastq.gz"
    site: "fr_anthropogenic"
    replicate: 2

  FR_nat_01:
    dna: "data/raw/FR_nat_01_dna.fastq.gz"
    rna: "data/raw/FR_nat_01_rna.fastq.gz"
    edna: "data/raw/FR_nat_01_edna.fastq.gz"
    site: "fr_natural"
    replicate: 1
  FR_nat_02:
    dna: "data/raw/FR_nat_02_dna.fastq.gz"
    rna: "data/raw/FR_nat_02_rna.fastq.gz"
    edna: "data/raw/FR_nat_02_edna.fastq.gz"
    site: "fr_natural"
    replicate: 2

  ES_anthro_01:
    dna: "data/raw/ES_anthro_01_dna.fastq.gz"
    rna: "data/raw/ES_anthro_01_rna.fastq.gz"
    edna: "data/raw/ES_anthro_01_edna.fastq.gz"
    site: "es_anthropogenic"
    replicate: 1
  ES_anthro_02:
    dna: "data/raw/ES_anthro_02_dna.fastq.gz"
    rna: "data/raw/ES_anthro_02_rna.fastq.gz"
    edna: "data/raw/ES_anthro_02_edna.fastq.gz"
    site: "es_anthropogenic"
    replicate: 2

  ES_nat_01:
    dna: "data/raw/ES_nat_01_dna.fastq.gz"
    rna: "data/raw/ES_nat_01_rna.fastq.gz"
    edna: "data/raw/ES_nat_01_edna.fastq.gz"
    site: "es_natural"
    replicate: 1
  ES_nat_02:
    dna: "data/raw/ES_nat_02_dna.fastq.gz"
    rna: "data/raw/ES_nat_02_rna.fastq.gz"
    edna: "data/raw/ES_nat_02_edna.fastq.gz"
    site: "es_natural"
    replicate: 2


# -- Quality control ----------------------------------------------------------
qc:
  metagenomics_min_quality: 9       # Shotgun metagenomics Q threshold
  metagenomics_min_length: 100      # Shotgun minimum read length (bp)
  aiv_min_quality: 8                # AIV WGS Q threshold
  aiv_min_length: 150               # AIV WGS minimum read length (bp)


# -- Read normalization -------------------------------------------------------
normalization:
  target_reads: 87000               # Subsampling depth for metagenomics


# -- Reference databases ------------------------------------------------------
references:
  kraken2_db: "/databases/kraken2/ncbi_nt_core"
  ncbi_nt_core: "/databases/ncbi/nt_core.fasta"
  diamond_nr_db: "/databases/diamond/nr.dmnd"
  vfdb: "/databases/vfdb/VFDB_setB_pro.dmnd"
  midori2_db: "/databases/midori2/MIDORI2_UNIQ_NUC_SP_GB266_srRNA_BLAST"
  aiv_segment_refs: "/databases/aiv/european_aiv_segments.fasta"
  gisaid_refs: "/databases/gisaid/aiv_ha_references.fasta"


# -- Pathogen identification --------------------------------------------------
pathogen:
  min_reads: 5                      # Minimum reads per species (CZID threshold)
  min_contigs: 1                    # Minimum contigs per species


# -- eDNA metabarcoding -------------------------------------------------------
edna:
  ngsfilter: "resources/ngsfilter.tsv"
  forward_primer: "ACTGGGATTAGATACCCCACTATG"     # MiFish-U forward
  reverse_primer: "TAGAACAGGCTCCTCTAG"            # MiFish-U reverse
  min_identity: 98                  # Minimum % identity for species assignment
  min_query_coverage: 80            # Minimum % query coverage
  min_reads: 5                      # Minimum reads per species
  otu_identity: 97                  # OTU clustering threshold
