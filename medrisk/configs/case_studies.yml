# KTG Worked Case Studies — Algorithm QA training cases for underwriting.
# Encoded from: docs/ktg_underwriting_manual.md, Part 5.
# Evidence tiers: T1 = guideline-level, T2 = observational, T3 = expert/market practice.

cases:

  # ---------------------------------------------------------------------------
  # Case 1: Single Psychiatric Episode — Algorithm Overreaction
  # ---------------------------------------------------------------------------

  - id: 1
    title: "Single Psychiatric Episode — Algorithm Overreaction"
    failure_mode: overreaction
    difficulty: easy

    applicant:
      age: 38
      occupation: "Marketing Manager (Angestellter)"
      occupation_class: 1
      ktg_daily: 150

    icd_history:
      - code: F32.1
        date: "2021-Q2"
        au_weeks: 7
        treatment: "Escitalopram 10mg"
    additional_info:
      - "GP certificate of remission: December 2021"
      - "Medication discontinued: March 2022"
      - "No further psychiatric contacts since 2021"
      - "No AU for psychiatric cause since 2021"

    algorithm_output:
      decision: decline
      rule: "F32.x = automatic decline for KTG"
      loading_pct: null

    correct_decision:
      decision: accept_with_loading
      loading_pct: [10, 15]
      exclusion: null
      duration_years: 2
      duration_note: "Accept with 10-15% loading for 2 years, then standard terms"

    explanation: >
      Algorithm correctly identified the psychiatric diagnosis but applied a
      blanket decline rule to F32 regardless of episode count, severity, time
      since episode, or remission status. A single moderate episode now 3+ years
      in full remission is not equivalent to recurrent severe depression. This is
      a textbook algorithmic overreaction failure mode. GP letter confirming
      remission is present. Antidepressant discontinued >24 months. No further
      AU episodes. No specialist follow-up. No psychiatric exclusion required for
      single episode in stable long-term remission.

    key_learning: >
      Algorithmic failure mode: overreaction. F32 blanket decline ignores temporal
      risk decay and episode count. Single episode in full remission is not a
      decline diagnosis.

    evidence_tier: T2

  # ---------------------------------------------------------------------------
  # Case 2: Recurrent Depression — Algorithm Underestimation
  # ---------------------------------------------------------------------------

  - id: 2
    title: "Recurrent Depression — Algorithm Underestimation"
    failure_mode: underestimation
    difficulty: moderate

    applicant:
      age: 44
      occupation: "Lehrerin (Beamtin)"
      occupation_class: 1
      ktg_daily: 100

    icd_history:
      - code: F33.1
        date: "2018"
        au_weeks: 5
      - code: F33.1
        date: "2020"
        au_weeks: 9
      - code: F33.1
        date: "2022"
        au_weeks: 11
    additional_info:
      - "Currently on sertraline 100mg — described as 'for prevention'"
      - "Last episode remitted: Q4 2022"
      - "No psychiatric hospitalisation"
      - "Regular GP follow-up"
      - "AU is escalating (5, 9, 11 weeks) — opposite of improving"

    algorithm_output:
      decision: accept_with_loading
      rule: "F33 = loading tier 2; most recent AU >12 months ago = time decay applied"
      loading_pct: 25

    correct_decision:
      decision: decline
      loading_pct: null
      exclusion: "Psychiatric AU exclusion only (if acceptable to applicant, as alternative to decline)"
      duration_years: null

    explanation: >
      Algorithm applied time decay to recurrent depression as if it were a single
      episode. F33 with three documented episodes and ongoing medication has no
      meaningful time decay. The loading of 25% is grossly insufficient for this
      profile. AU is escalating (5, 9, 11 weeks) — this is the opposite of
      improving. Ongoing sertraline = active management, not remission. This is
      not a loading case — three escalating episodes with ongoing medication is a
      decline or exclusion-only profile.

    key_learning: >
      Algorithmic failure mode: underestimation. Time decay logic must not be
      applied to recurrent conditions. Episode count and AU trend are more
      informative than time since last episode.

    evidence_tier: "T2/T3"

  # ---------------------------------------------------------------------------
  # Case 3: Adjustment Disorder — Correct Acceptance
  # ---------------------------------------------------------------------------

  - id: 3
    title: "Adjustment Disorder — Correct Acceptance (Algorithm Broadly Right)"
    failure_mode: correct
    difficulty: easy

    applicant:
      age: 29
      occupation: "Software Engineer"
      occupation_class: 1
      ktg_daily: 120

    icd_history:
      - code: F43.2
        date: "2022"
        au_weeks: 4
        treatment: "6 sessions CBT; no medication"
    additional_info:
      - "Following job redundancy (stressor)"
      - "Fully returned to work"
      - "New employment secured within 3 months"
      - "No further psychiatric contacts"
      - "Stressor resolved (new employment = objective marker)"

    algorithm_output:
      decision: accept_with_loading
      rule: "F43 coded = psychiatric history; review recommended"
      loading_pct: 15

    correct_decision:
      decision: accept
      loading_pct: [0, 10]
      exclusion: null
      duration_years: 1
      duration_note: "Standard terms, or at most 10% loading for 1 year"

    explanation: >
      Algorithm correctly identified the psychiatric code and did not decline.
      The 15% loading is in the right zone for a recent event but may be slightly
      high for a true adjustment disorder with complete resolution and no
      recurrence. The stressor (redundancy) was time-limited and resolved.
      CBT without medication = good prognostic sign. F43 with complete stressor
      resolution and no recurrence is near-standard-risk after 18 months.
      Algorithm got broadly right but slightly over-loaded.

    key_learning: >
      Algorithmic failure mode: minor overreaction. Z73 and F43 with stressor
      resolution are not equivalent to F32/F33. Validate stressor resolution
      before loading.

    evidence_tier: T2

  # ---------------------------------------------------------------------------
  # Case 4: Musculoskeletal Without Surgery — Missing Occupation Data
  # ---------------------------------------------------------------------------

  - id: 4
    title: "Musculoskeletal Without Surgery — Missing Occupation Data"
    failure_mode: missing_data
    difficulty: moderate

    applicant:
      age: 51
      occupation: "Physiotherapist (self-employed)"
      occupation_class: 3
      ktg_daily: 200

    icd_history:
      - code: M51.1
        date: "2021"
        au_weeks: 9
        treatment: "Conservative: physiotherapy, NSAIDs, epidural steroid injection x2"
      - code: M54.5
        date: "2023"
        au_weeks: 2
        treatment: "Described as 'flare of pre-existing back condition'"
    additional_info:
      - "MRI 2022: persistent disc bulge L4/L5 without current radiculopathy"
      - "Physiotherapy is high-demand physical work"
      - "Occupation-diagnosis interaction not captured by algorithm"

    algorithm_output:
      decision: accept_with_exclusion_and_loading
      rule: "M51 with recurrence = exclusion + loading"
      loading_pct: 30

    correct_decision:
      decision: accept_with_exclusion
      loading_pct: 0
      exclusion: "Musculoskeletal exclusion"
      duration_years: null
      duration_note: "Remove loading given exclusion covers primary risk; flag for expert review due to occupation (physiotherapist + M51.1)"

    explanation: >
      Identifying the structural disc pathology and applying an exclusion is
      clinically appropriate. However, the 30% loading on top of the exclusion
      is likely excessive — if the musculoskeletal exclusion covers the primary
      risk, the loading should reflect residual non-musculoskeletal risk only.
      The critical missed factor is occupation — physiotherapy is high-demand
      physical work. The occupation multiplier should trigger automatic expert
      review, not just loading. Occupation-diagnosis interaction (physiotherapist
      + M51.1) is materially different risk than same diagnosis in a software
      developer.

    key_learning: >
      Algorithmic failure mode: missing occupation data. Identical diagnoses carry
      categorically different risk in physical vs sedentary occupations. Occupation
      must be integrated into musculoskeletal risk assessment.

    evidence_tier: "T2/T3"

  # ---------------------------------------------------------------------------
  # Case 5: Musculoskeletal With Surgery — Incomplete Recovery Assessment
  # ---------------------------------------------------------------------------

  - id: 5
    title: "Musculoskeletal With Surgery — Incomplete Recovery Assessment"
    failure_mode: premature_decline
    difficulty: hard

    applicant:
      age: 47
      occupation: "Logistics Manager (warehouse supervision)"
      occupation_class: 2
      ktg_daily: 130

    icd_history:
      - code: M51.1
        date: "2020"
        au_weeks: 14
        treatment: "L5/S1 microdiscectomy Q3 2020"
      - code: M54.5
        date: "2021"
        au_weeks: 3
      - code: M54.5
        date: "2022"
        au_weeks: 5
    additional_info:
      - "Post-surgical physiotherapy completed 2021"
      - "No documented specialist follow-up currently"
      - "NSAIDs PRN"
      - "Works full-time"
      - "Occupation is semi-physical (warehouse supervision)"

    algorithm_output:
      decision: decline
      rule: "Post-disc-surgery + recurrent AU = decline"
      loading_pct: null

    correct_decision:
      decision: postpone
      loading_pct: null
      exclusion: "Musculoskeletal exclusion (if surgeon confirms good outcome)"
      duration_years: null
      duration_note: "Postpone pending post-surgical assessment report. If good outcome: accept with MSK exclusion. If failed back surgery: decline."

    explanation: >
      The post-surgical + recurrent AU pattern is a legitimate concern, but
      decline without requesting a post-surgical assessment is premature. The
      recurrent M54.5 episodes (3 and 5 weeks) may represent normal post-surgical
      rehabilitation variability, or may indicate ongoing structural instability.
      The outcome quality of the surgery is unknown. Key questions: residual
      neurological deficit? AU trend improving or worsening? Signs of
      re-herniation? Progressing toward recovery or chronic pain syndrome?
      Do not decline based on ICD codes alone without functional outcome data.

    key_learning: >
      Algorithmic failure mode: premature decline. Post-surgical ICD history must
      be evaluated against functional outcome, not just code presence. Physician
      report is mandatory in this scenario.

    evidence_tier: "T2/T3"

  # ---------------------------------------------------------------------------
  # Case 6: Controlled T2DM Plus Cardiovascular Comorbidity
  # ---------------------------------------------------------------------------

  - id: 6
    title: "Controlled T2DM Plus Cardiovascular Comorbidity"
    failure_mode: naive_linear_stacking
    difficulty: moderate

    applicant:
      age: 57
      occupation: "Accountant (Steuerberater)"
      occupation_class: 1
      ktg_daily: 180

    icd_history:
      - code: E11.9
        date: "2017"
        au_weeks: 0
        treatment: "Metformin 1g BD; HbA1c 7.1%"
      - code: I10
        date: "2015"
        au_weeks: 0
        treatment: "Ramipril 5mg + Amlodipine 5mg"
      - code: E78.5
        date: null
        au_weeks: 0
        treatment: "Atorvastatin 20mg"
    additional_info:
      - "No AU attributable to metabolic conditions"
      - "BMI 27 (self-reported)"
      - "Sedentary occupation — occupation modifier is favourable"
      - "Metabolic triad: E11 + I10 + E78"

    algorithm_output:
      decision: accept_with_exclusion_and_loading
      rule: "E11 = 20%, I10 = 15%, E78 = 10% additive stacking"
      loading_pct: 45

    correct_decision:
      decision: accept_with_loading_and_exclusion
      loading_pct: [25, 30]
      exclusion: "Metabolic exclusion for T2DM-direct complications"
      duration_years: null
      duration_note: "Single integrated metabolic loading of 25-30%; do not stack three separate loadings naively"

    explanation: >
      Correctly identifying the metabolic triad as elevated risk. However, naive
      linear stacking of loadings overestimates current risk. The actual current
      AU risk from this well-controlled accountant is low (sedentary occupation,
      HbA1c 7.1%, BP presumably controlled on 2 agents). The correct underwriting
      question is: what is the long-term tail risk from cardiovascular events, and
      how does the current control status modify it? Algorithm stacked loading
      (45%) overridden. Integrated assessment: ~28% loading + metabolic exclusion.

    key_learning: >
      Algorithmic failure mode: naive linear stacking. Metabolic comorbidities
      require integrated assessment, not additive loading. Control status and
      occupation must modify the output.

    evidence_tier: "T2/T3"

  # ---------------------------------------------------------------------------
  # Case 7: Mixed Psychiatric and Physical Morbidity
  # ---------------------------------------------------------------------------

  - id: 7
    title: "Mixed Psychiatric and Physical Morbidity"
    failure_mode: missing_functional_status
    difficulty: hard

    applicant:
      age: 42
      occupation: "Kindergarten teacher (Erzieherin)"
      occupation_class: 2
      ktg_daily: 90

    icd_history:
      - code: F32.0
        date: "2020"
        au_weeks: 4
        treatment: "Resolved without medication"
      - code: M79.7
        date: "2021"
        au_weeks: 0
        treatment: "Diagnosed by rheumatologist; Duloxetine 60mg (dual-use: pain + mood)"
      - code: M79.7
        date: "2022"
        au_weeks: 6
      - code: F32.0
        date: "2023"
        au_weeks: 8
        treatment: "GP recoded same episode"
    additional_info:
      - "Duloxetine 60mg treats both FMS and mood — dual-use"
      - "Ongoing rheumatology follow-up"
      - "Part-time work (60%) since 2022 — objective impairment marker"
      - "Coding inconsistency: same episode coded M79.7 in 2022 and F32.0 in 2023"
      - "AU trend is worsening (4, 6, 8 weeks)"

    algorithm_output:
      decision: accept_with_loading
      rule: "F32 = 15%, M79 = 20% additive"
      loading_pct: 35

    correct_decision:
      decision: expert_review_required
      loading_pct: null
      exclusion: "Dual exclusion (psychiatric + musculoskeletal) if rheumatology confirms stabilisation"
      duration_years: null
      duration_note: "Part-time marker changes risk category. If full capacity cannot be confirmed: decline or very high loading + dual exclusion."

    explanation: >
      Multiple problems: (1) coding inconsistency (same episode coded differently
      in 2022 vs 2023) is missed; (2) depression and FMS are not independent —
      duloxetine treats both, shared pathophysiology; (3) the most important
      signal — part-time work since 2022 — is not captured in ICD coding at all;
      (4) AU trend is worsening. This is a significantly under-assessed risk.
      Part-time employment (60%) is an objective marker of significant ongoing
      functional impairment. Erzieherin occupation has high physical and emotional
      demands. Algorithm 35% loading is insufficient.

    key_learning: >
      Algorithmic failure mode: missing functional status data. ICD codes do not
      capture employment capacity. Part-time work is one of the most powerful AU
      risk markers and is invisible to code-based algorithms.

    evidence_tier: "T2/T3"

  # ---------------------------------------------------------------------------
  # Case 8: High-Income Self-Employed Edge Case
  # ---------------------------------------------------------------------------

  - id: 8
    title: "High-Income Self-Employed Edge Case"
    failure_mode: au_history_gap
    difficulty: hard

    applicant:
      age: 49
      occupation: "Consultant / Managing Partner (self-employed)"
      occupation_class: 1
      ktg_daily: 300

    icd_history:
      - code: I48.0
        date: "2022"
        au_weeks: 0
        treatment: "One cardioversion performed; bisoprolol + rivaroxaban (rate-controlled, anticoagulated)"
      - code: I10
        date: "2018"
        au_weeks: 0
        treatment: "Olmesartan 20mg, well-controlled"
      - code: G43.0
        date: "2015"
        au_weeks: 0
        treatment: "2-3 attacks/month, sumatriptan responsive"
    additional_info:
      - "No AU history documented (self-employed — no AU certificates issued)"
      - "Self-employed applicants manage AU differently (often working through illness)"
      - "Financial underwriting required for high sum (EUR 300/day)"
      - "Low AU history reflects self-employed status, not health"

    algorithm_output:
      decision: manual_review
      rule: "I48 = automatic manual review; sum insured exceeds auto-approval limit"
      loading_pct: null

    correct_decision:
      decision: accept_with_loading
      loading_pct: 25
      exclusion: null
      duration_years: null
      duration_note: "Cardiovascular loading (25%) for AF + controlled hypertension. Migraine at standard terms (episodic, triptan-responsive). Financial underwriting confirmation required."

    explanation: >
      Algorithm correctly escalated due to high sum insured and AF diagnosis.
      I48 as an automatic manual review trigger is appropriate. Nothing obviously
      wrong with escalation. The challenge is clinical: the applicant's low AU
      history reflects self-employed status, not health. Self-employed applicants
      manage AU differently (often working through illness). This creates both
      under-reporting and genuine AU risk that only materialises if a significant
      acute event occurs. Needs: financial underwriting (confirm income for
      EUR 300/day), echocardiography (structural normality, LVEF), CHA2DS2-VASc
      (already anticoagulated — favourable), migraine frequency confirmation.

    key_learning: >
      Algorithmic failure mode: AU history gap for self-employed. Absence of AU
      records in self-employed applicants is not equivalent to health — it reflects
      payment structure. Risk assessment must rely more heavily on clinical data
      and less on AU history in this group.

    evidence_tier: "T2/T3"

  # ---------------------------------------------------------------------------
  # Case 9: Migraine Plus GAD — Improving Trend Ignored
  # ---------------------------------------------------------------------------

  - id: 9
    title: "Migraine Plus GAD — Improving Trend Ignored"
    failure_mode: ignoring_trend
    difficulty: moderate

    applicant:
      age: 34
      occupation: "Journalist (angestellt)"
      occupation_class: 1
      ktg_daily: 110

    icd_history:
      - code: G43.0
        date: "2018"
        au_weeks: null
        treatment: "Propranolol 40mg BD as prophylaxis; 4-6 attacks/month"
      - code: F41.1
        date: "2020"
        au_weeks: null
        treatment: "Sertraline 50mg; 12 sessions CBT completed 2021"
    additional_info:
      - "AU timeline: 2019 (3 weeks, migraine), 2020 (5 weeks, mixed migraine/anxiety), 2021 (2 weeks, migraine), 2022 (1 week, migraine)"
      - "AU trend is improving: 5 weeks (2020) -> 1 week (2022)"
      - "No hospitalisation"
      - "Stable employment"
      - "GAD well-managed (CBT completed, stable sertraline)"

    au_timeline:
      - {year: 2019, weeks: 3, cause: migraine}
      - {year: 2020, weeks: 5, cause: "mixed migraine/anxiety"}
      - {year: 2021, weeks: 2, cause: migraine}
      - {year: 2022, weeks: 1, cause: migraine}

    algorithm_output:
      decision: accept_with_loading
      rule: "G43 = 20%, F41 = 20% additive"
      loading_pct: 40

    correct_decision:
      decision: accept_with_loading_and_exclusion
      loading_pct: [20, 25]
      exclusion: "Neurological exclusion (for migraine component)"
      duration_years: null
      duration_note: "Single integrated neuropsychiatric loading of 20-25% reflecting improving trend"

    explanation: >
      Linear stacking misses interaction and ignores trend. The GAD is well-managed
      (CBT completed, stable sertraline), and the AU trend is improving (5 weeks
      in 2020 -> 1 week in 2022). The algorithm applies the same loading regardless
      of trajectory. Need to confirm current migraine attack frequency, GAD stable
      remission, and propranolol efficacy. Algorithm 40% stacked loading overridden.
      Integrated loading 22% + neurological exclusion.

    key_learning: >
      Algorithmic failure mode: ignoring trend data. An improving AU trajectory
      materially changes the risk assessment but is invisible to code-based
      algorithms that treat conditions statically.

    evidence_tier: "T2/T3"

  # ---------------------------------------------------------------------------
  # Case 10: Algorithm Was Correct — Validating the Output
  # ---------------------------------------------------------------------------

  - id: 10
    title: "Algorithm Was Correct — Validating the Output"
    failure_mode: correct
    difficulty: hard

    applicant:
      age: 53
      occupation: "Construction site supervisor (manual oversight + physical presence)"
      occupation_class: 3
      ktg_daily: 160

    icd_history:
      - code: F33.2
        date: "2015"
        au_weeks: [10, 14]
        treatment: null
      - code: F33.2
        date: "2018"
        au_weeks: [10, 14]
        treatment: null
      - code: F33.2
        date: "2021"
        au_weeks: [10, 14]
        treatment: null
      - code: M51.1
        date: "2019"
        au_weeks: 12
        treatment: "Microdiscectomy L3/L4, 2019"
      - code: M54.5
        date: "2021"
        au_weeks: 6
      - code: M54.5
        date: "2022"
        au_weeks: 8
      - code: E11.9
        date: "2020"
        au_weeks: 0
        treatment: "Metformin + sitagliptin; HbA1c 8.2%"
    additional_info:
      - "F33.2: recurrent depression, severe — episodes 2015, 2018, 2021 each with AU 10-14 weeks"
      - "Duloxetine 120mg currently"
      - "Still seeing psychiatrist quarterly"
      - "M54.5 post-surgery recurrence worsening (6 weeks -> 8 weeks)"
      - "E11.9: HbA1c 8.2% indicates poor glycaemic control"
      - "Semi-physical occupation (construction supervision)"
      - "Three independent high-risk conditions with no favourable prognostic markers"

    algorithm_output:
      decision: decline
      rule: "F33 with >=3 episodes = decline; post-surgical M51 with recurrent AU = decline; E11 HbA1c >8% = decline"
      loading_pct: null

    correct_decision:
      decision: decline
      loading_pct: null
      exclusion: null
      duration_years: null
      duration_note: "Algorithm decline validated by human review. No overriding factors. If applicant insists: discuss limited KTG with 6-month waiting period, triple exclusion, low daily sum."

    explanation: >
      This time the algorithm is correct. Three recurrent severe depressive episodes
      with ongoing psychiatric follow-up and duloxetine, post-surgical disc pathology
      with worsening AU trend, poor glycaemic control, and semi-physical occupation
      — the combination is uninsurable for standard KTG without major restrictions.
      The algorithm may not have assessed whether any element could be ring-fenced,
      but three independent high-risk conditions with no favourable prognostic markers
      means the output is substantively correct. No additional evidence would change
      the decision. Decline confirmed.

    key_learning: >
      Validation is as important as override. Human expert must be able to confirm
      when the algorithm is right, not just when it is wrong. Document the
      validation explicitly.

    evidence_tier: "T2/T3"
