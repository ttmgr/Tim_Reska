# KTG Underwriting Profiles — Clinical risk assessment for Krankentagegeld (PKV).
# Encoded from: docs/ktg_underwriting_manual.md, Parts 1 & 3.
# Evidence tiers: T1 = guideline-level, T2 = observational, T3 = expert/market practice.
# All ICD codes are ICD-10-GM unless noted otherwise.

profiles:

  # ---------------------------------------------------------------------------
  # 1.1 Psychiatric Conditions
  # ---------------------------------------------------------------------------

  mood_disorders:
    cluster: psychiatric
    label: "Mood Disorders (Depressive & Bipolar Spectrum)"
    icd_codes: ["F31", "F32", "F33", "F34"]
    icd_subtypes:
      F31:
        severity: very_high
        label: "Bipolare Stoerung"
      F32.0:
        severity: mild
        label: "Leichte depressive Episode"
      F32.1:
        severity: moderate
        label: "Mittelgradige depressive Episode"
      F32.2:
        severity: severe
        label: "Schwere depressive Episode ohne psychotische Symptome"
      F32.3:
        severity: very_severe
        label: "Schwere depressive Episode mit psychotischen Symptomen"
      F33:
        severity: high
        label: "Rezidivierende depressive Stoerung"
      F34:
        severity: moderate
        label: "Anhaltende affektive Stoerungen"

    au_durations:
      single_mild_moderate:
        description: "Single mild/moderate episode (F32.0/F32.1)"
        median_weeks: [6, 12]
        recurrence_rate: 0.30
        recurrence_window_years: 5
        evidence: T2
        source: "DGPPN S3 Leitlinie Depression"
      single_severe:
        description: "Single severe episode (F32.2/F32.3)"
        median_weeks: [12, 24]
        recurrence_rate: 0.50
        recurrence_window_years: 2
        evidence: T2
      recurrent:
        description: "Recurrent disorder (F33) — each subsequent episode more severe and longer"
        median_weeks: null  # escalating per episode
        recurrence_rate: 0.90
        recurrence_window_years: null  # lifetime after 3+ episodes
        evidence: T1
      bipolar:
        description: "Bipolar disorder (F31) — highest KTG risk in mood cluster"
        median_weeks: null  # cycling unpredictable
        episodes_per_decade: [5, 10]
        recurrence_rate: null
        evidence: T1
      treatment_resistant:
        description: "Treatment-resistant depression — AU often exceeds 12 months"
        median_weeks: [52, null]
        recurrence_rate: null
        evidence: T3

    prognostic_factors:
      - name: remission_status
        type: categorical
        thresholds:
          full: "Return to prior occupational level"
          partial: "Residual symptoms present"
        risk_impact: "Most critical factor — full vs partial remission"
        evidence: T1

      - name: episode_count
        type: integer
        thresholds:
          low: 1
          high: 2
        risk_impact: "Two prior episodes = high-risk category regardless of current remission"
        evidence: T1

      - name: time_since_last_episode_months
        type: numeric
        thresholds:
          high_risk: 12
          moderate_risk: 24
          lower_risk: 24  # >24 months in full remission with stable medication
        risk_impact: "<12 months = high risk; 12-24 = moderate; >24 in full remission = lower"
        evidence: T2

      - name: medication
        type: categorical
        thresholds:
          on_antidepressant: "Not necessarily negative if for relapse prevention"
          off_medication_recurrent: "May indicate poor adherence or treatment gap"
        risk_impact: "Context-dependent — prophylactic vs absent after recurrent episodes"
        evidence: T3

      - name: inpatient_psychiatric_treatment
        type: boolean
        thresholds:
          present: true
        risk_impact: "Strong negative prognostic marker — indicates severity requiring hospitalisation"
        evidence: T1

      - name: comorbid_anxiety
        type: boolean
        thresholds:
          present: true
        risk_impact: "Doubles long-term AU duration"
        evidence: T2

      - name: comorbid_substance_use
        type: boolean
        thresholds:
          present: true
        risk_impact: "Major risk amplifier — see comorbidity matrix"
        evidence: T2

      - name: occupational_stress_exposure
        type: categorical
        thresholds:
          high_demand: "Physicians, managers, lawyers"
        risk_impact: "Higher recurrence risk in high-demand professions"
        evidence: T3

      - name: bipolar_vs_unipolar
        type: categorical
        thresholds:
          bipolar: "Categorically higher risk for KTG"
        risk_impact: "Long-term medication required; manic episodes cause acute non-AU risk events"
        evidence: T1

    underwriting_responses:
      accept:
        conditions:
          - "First episode"
          - "Full remission >24 months"
          - "No psychotropic medication"
          - "No hospitalisation"
          - "No recurrence risk markers"
        evidence: T2
      loading:
        conditions:
          - "First episode"
          - "Remission 12-24 months"
          - "Stable on antidepressant for relapse prevention"
          - "Good occupational function"
        loading_range: [10, 50]
        evidence: T3
      exclusion:
        conditions:
          - "Recurrent episodes (>=2)"
          - "Currently stable but history of multiple AU episodes"
        exclusion_type: "Psychiatric AU excluded"
        evidence: T3
      postpone:
        conditions:
          - "Active episode ongoing"
          - "Recently initiated treatment"
          - "<6 months remission"
        duration_months: [12, 24]
        evidence: T3
      decline:
        conditions:
          - "Recurrent severe disorder with >=3 inpatient admissions"
          - "Treatment-resistant depression"
          - "Bipolar disorder with recent cycling"
          - "Any active episode at time of application"
        evidence: T3

    failure_modes:
      - type: overreaction
        description: "Treating a single ICD F32 code from 5 years ago as equivalent to current recurrent depression — ignores time decay and episode count"
      - type: underestimation
        description: "Accepting F33 applicant because most recent AU episode was coded F43 (adjustment disorder) — missed pattern recognition across episodes"
      - type: coding_ambiguity
        description: "F32/F43 differential is clinically significant but coding varies by treating physician; algorithms cannot distinguish without severity markers in physician report"
      - type: missed_bipolar
        description: "F31 is sometimes initially coded F32 or F33 until pattern is recognised — first bipolar manic episode may appear as F30 without prior depressive history"

    lookback_standard_years: 3
    lookback_extended_years: 5
    lookback_extended_condition: "Severe or hospitalised single episode"
    lookback_notes: "For F33 recurrent: standard=10 years, extended=lifetime. Each prior episode is prognostically relevant; no meaningful decay [T1]"

  # ---------------------------------------------------------------------------

  anxiety_stress:
    cluster: psychiatric
    label: "Anxiety and Stress-Related Disorders"
    icd_codes: ["F40", "F41", "F43", "Z73"]
    icd_subtypes:
      F40.2:
        severity: low
        label: "Spezifische (isolierte) Phobien"
      F41.0:
        severity: moderate
        label: "Panikstörung"
      F41.1:
        severity: moderate_high
        label: "Generalisierte Angststörung (GAD)"
      F41.2:
        severity: moderate
        label: "Angst und depressive Störung, gemischt"
      F43.1:
        severity: high
        label: "Posttraumatische Belastungsstörung (PTSD)"
      F43.2:
        severity: low
        label: "Anpassungsstörungen"
      Z73:
        severity: variable
        label: "Burnout / Probleme bei der Lebensbewältigung (not a psychiatric diagnosis)"

    au_durations:
      simple_phobia:
        description: "Simple phobia (F40.2) — minimal AU impact if occupationally non-disabling"
        median_weeks: [0, 2]
        recurrence_rate: null
        evidence: T2
      panic_disorder:
        description: "Panic disorder (F41.0) — acute episodes, moderate AU risk"
        median_weeks: [3, 8]
        recurrence_rate: null
        recurrence_note: "Per year in untreated cases"
        evidence: T2
      gad:
        description: "Generalised anxiety disorder (F41.1) — chronic course, significant AU"
        median_weeks: [4, 6]
        recurrence_rate: null
        recurrence_note: "Per year in treated patients"
        evidence: T2
      adjustment_disorder:
        description: "Adjustment disorder (F43.2) — time-limited (resolves within 6 months of stressor removal)"
        median_weeks: null
        recurrence_rate: null
        recurrence_note: "Single AU episode typical"
        evidence: T1
      ptsd:
        description: "PTSD (F43.1) — highly variable; chronic PTSD has AU profile closer to severe depression"
        median_weeks: null
        recurrence_rate: null
        evidence: T2
      burnout:
        description: "Burnout (Z73) — Z73 is not a psychiatric diagnosis; AU duration varies enormously"
        median_weeks: null
        recurrence_rate: null
        evidence: T3

    prognostic_factors:
      - name: chronicity
        type: categorical
        thresholds:
          isolated_reaction: "Isolated adjustment reaction"
          chronic: "Chronic anxiety disorder"
        risk_impact: "Clinically distinct — must be separated"
        evidence: T2

      - name: stressor_resolution
        type: boolean
        thresholds:
          resolved: true
          ongoing: false
        risk_impact: "For F43, ongoing stressor (divorce, family illness) worsens prognosis"
        evidence: T2

      - name: comorbid_mood_disorder
        type: boolean
        thresholds:
          present: true
        risk_impact: "GAD + depression has worst AU prognosis in anxiety cluster"
        evidence: T1

      - name: treatment_status
        type: categorical
        thresholds:
          cbt_completed: "CBT completion for phobia/panic = favourable"
          untreated_gad: "Untreated GAD = higher risk"
        risk_impact: "Treatment completion strongly modifies prognosis"
        evidence: T2

      - name: burnout_underlying_f_code
        type: boolean
        thresholds:
          no_f_code: "Risk closer to general population"
        risk_impact: "Seek underlying F-code; if absent, Z73 is lower risk"
        evidence: T3

      - name: ptsd_trauma_type
        type: categorical
        thresholds:
          single_incident: "Better prognosis"
          complex_childhood: "Worse prognosis"
        risk_impact: "Complex PTSD has worse prognosis than single-incident"
        evidence: T2

    underwriting_responses:
      accept:
        conditions:
          - "Isolated phobia (non-occupationally-disabling)"
          - "Single F43 episode fully resolved >12 months"
          - "Z73 without underlying F-code"
        evidence: T3
      loading:
        conditions:
          - "GAD in remission >12 months on stable medication"
          - "Resolved panic disorder with CBT"
        loading_range: [10, 25]
        evidence: T3
      exclusion:
        conditions:
          - "Chronic GAD with >=2 AU episodes"
          - "Ongoing medication for anxiety"
        exclusion_type: "Psychiatric AU excluded"
        evidence: T3
      postpone:
        conditions:
          - "Active F43 or F41 episode"
          - "<6 months since last AU for psychiatric cause"
        duration_months: [12, 12]
        evidence: T3
      decline:
        conditions:
          - "PTSD with severe functional impairment"
          - "Treatment-resistant anxiety disorder"
          - "Chronic anxiety + comorbid depression"
        evidence: T3

    failure_modes:
      - type: overreaction
        description: "Treating Z73 as equivalent to F41 — Z73 is a contact reason code, not a psychiatric diagnosis"
      - type: underestimation
        description: "Accepting F43 without checking whether F32/F33 codes exist earlier in history — adjustment disorder sometimes used to soften a depression diagnosis"
      - type: missed_ptsd
        description: "F43.1 may appear as only one ICD entry but represent a chronic severely impairing condition; algorithm may not weight it differently from adjustment disorder"
      - type: coding_heterogeneity
        description: "GAD, panic, and mixed anxiety-depression (F41.2) are clinically distinct but may be coded interchangeably by GPs"

    lookback_standard_years: 3
    lookback_extended_years: 5
    lookback_extended_condition: "Chronic or hospitalised"

  # ---------------------------------------------------------------------------

  personality_disorders:
    cluster: psychiatric
    label: "Personality Disorders"
    icd_codes: ["F60", "F61"]
    icd_subtypes:
      F60.0:
        severity: moderate
        label: "Paranoide Persönlichkeitsstörung"
      F60.2:
        severity: low_au_but_integrity_concern
        label: "Dissoziale Persönlichkeitsstörung"
      F60.3:
        severity: very_high
        label: "Emotional instabile / Borderline Persönlichkeitsstörung"
      F60.4:
        severity: moderate
        label: "Histrionische Persönlichkeitsstörung"
      F60.5:
        severity: low_or_negative
        label: "Anankastische Persönlichkeitsstörung"
      F60.6:
        severity: high
        label: "Ängstlich-vermeidende Persönlichkeitsstörung"
      F60.7:
        severity: moderate_high
        label: "Abhängige Persönlichkeitsstörung"
      F61:
        severity: variable
        label: "Kombinierte Persönlichkeitsstörungen"

    au_durations:
      borderline:
        description: "Borderline (F60.3) — highest AU risk; crisis episodes cause recurrent short AU; inpatient admissions common"
        median_weeks: [6, null]
        recurrence_rate: null
        recurrence_note: "Annual AU often exceeds 6 weeks"
        evidence: T2
      anxious_avoidant:
        description: "Anxious-avoidant (F60.6) — chronic low-grade impairment; moderate annual AU"
        median_weeks: null
        recurrence_rate: null
        recurrence_note: "Risk amplified by high-demand occupations"
        evidence: T2
      dependent:
        description: "Dependent (F60.7) — AU often triggered by relationship crises; unpredictable pattern"
        median_weeks: null
        recurrence_rate: null
        evidence: T3
      anankastic:
        description: "Anankastic (F60.5) — may reduce AU in structured occupations; monitor for comorbid OCD"
        median_weeks: null
        recurrence_rate: null
        recurrence_note: "May have zero or negative KTG impact"
        evidence: T3
      antisocial:
        description: "Antisocial (F60.2) — low direct AU risk but underwriting integrity concerns"
        median_weeks: null
        recurrence_rate: null
        evidence: T3

    prognostic_factors:
      - name: chronicity
        type: categorical
        thresholds:
          chronic: "Personality disorders are chronic by definition — remission does not apply in traditional sense"
        risk_impact: "Assess current functional level and treatment engagement"
        evidence: T1

      - name: dbt_completion
        type: boolean
        thresholds:
          completed: true
        risk_impact: "DBT completion for borderline significantly improves prognosis and reduces crisis episodes"
        evidence: T1

      - name: inpatient_admissions
        type: integer
        thresholds:
          each_admission: "Significantly increases expected future AU"
        risk_impact: "Strong negative prognostic marker"
        evidence: T2

      - name: comorbid_substance_use
        type: boolean
        thresholds:
          present: true
        risk_impact: "Major risk amplifier"
        evidence: T2

      - name: occupational_stability
        type: boolean
        thresholds:
          stable_2_years: "Sustained employment in same role >2 years = favourable"
        risk_impact: "Favourable functional marker"
        evidence: T3

      - name: age
        type: numeric
        thresholds:
          attenuation_age: 35
        risk_impact: "Borderline symptoms often attenuate somewhat after age 35-40"
        evidence: T2

    underwriting_responses:
      accept:
        conditions:
          - "Anankastic personality disorder"
          - "Stable occupational function"
          - "No hospitalisation"
          - "No AU in past 3 years"
        evidence: T3
      exclusion:
        conditions:
          - "Most other personality disorders with good functional stability"
          - "No recent crisis"
        exclusion_type: "Psychiatric AU excluded"
        evidence: T3
      postpone:
        conditions:
          - "Borderline with >=1 inpatient admission in past 3 years"
          - "Any personality disorder with active crisis pattern"
          - "Combination with substance use disorder"
        evidence: T3
      decline:
        conditions:
          - "Borderline with multiple inpatient admissions"
          - "Antisocial with legal history"
          - "Any personality disorder causing >8 weeks AU in past 12 months"
        evidence: T3

    failure_modes:
      - type: over_penalising_anankastic
        description: "F60.5 may have zero or negative KTG impact in structured professions"
      - type: missing_severity_distinction
        description: "Treating F60.3 borderline identically to F60.5 anankastic is a major error"
      - type: coding_rarity
        description: "Personality disorder diagnoses are under-coded in German primary care — absence of F60 does not mean absence of PD; look for repeated crisis-coded contacts"
      - type: missing_dbt_marker
        description: "Completed DBT is a clinically meaningful positive prognostic factor that no algorithm currently extracts from free text"

    lookback_standard_years: null  # lifetime
    lookback_extended_years: null  # lifetime
    lookback_extended_condition: "Chronic by definition; no time decay"

  # ---------------------------------------------------------------------------
  # 1.2 Musculoskeletal Conditions
  # ---------------------------------------------------------------------------

  disc_conditions:
    cluster: musculoskeletal
    label: "Intervertebral Disc Conditions"
    icd_codes: ["M50", "M51"]
    icd_subtypes:
      M50:
        severity: moderate
        label: "Zervikaler Bandscheibenschaden"
      M51:
        severity: moderate
        label: "Sonstiger Bandscheibenschaden (lumbar/thoracic) — without radiculopathy"
      M51.1:
        severity: high
        label: "Bandscheibenprolaps mit Radikulopathie"

    au_durations:
      uncomplicated_degeneration:
        description: "Uncomplicated M51 (disc degeneration without radiculopathy)"
        median_weeks: [2, 6]
        recurrence_rate: [0.40, 0.60]
        recurrence_window_years: 5
        evidence: T2
      radiculopathy_conservative:
        description: "M51.1 with radiculopathy, conservative management"
        median_weeks: [6, 12]
        surgery_rate: 0.30
        evidence: T2
      post_surgical_discectomy:
        description: "Post-surgical (discectomy) — return to work typically 6-12 weeks"
        median_weeks: [6, 12]
        reherniation_rate: [0.05, 0.15]
        reherniation_window_years: 5
        evidence: T1
        source: "AWMF S2k Leitlinie Bandscheibenprolaps"
      multilevel_chronic:
        description: "Multiple level disease or chronic radiculopathy — recurrent pattern"
        median_weeks: [4, 8]
        recurrence_rate: null
        recurrence_note: "Expect 4-8 weeks AU annually long-term"
        evidence: T2

    prognostic_factors:
      - name: radiological_severity
        type: categorical
        thresholds:
          single_level: "Lower risk"
          multilevel: "Higher risk"
          spinal_stenosis_comorbidity: "Significantly higher risk"
        risk_impact: "Multilevel disease and spinal stenosis substantially elevate risk"
        evidence: T2

      - name: neurological_deficit
        type: categorical
        thresholds:
          motor_weakness: "Severe"
          bladder_bowel: "Severe — usually surgical indication"
        risk_impact: "Motor weakness or bladder/bowel involvement = severe"
        evidence: T1

      - name: surgery_history
        type: categorical
        thresholds:
          microdiscectomy: "Better prognosis"
          fusion: "Higher complexity"
        risk_impact: "Type, outcome, and time since surgery all matter"
        evidence: T1

      - name: occupation
        type: categorical
        thresholds:
          heavy_manual: "Significantly worsens prognosis"
          sedentary_ergonomic: "Better prognosis"
        risk_impact: "Heavy manual labour significantly worsens prognosis"
        evidence: T1

      - name: bmi_obesity
        type: numeric
        thresholds:
          elevated: 30
        risk_impact: "Strong prognostic factor for recurrence"
        evidence: T2

      - name: pain_chronification
        type: boolean
        thresholds:
          chronic_weeks: 12
        risk_impact: "Pain >12 weeks = risk of central sensitisation, dramatically worsens prognosis"
        evidence: T1

      - name: psychosocial_yellow_flags
        type: categorical
        thresholds:
          catastrophising: "Predicts chronification"
          depression: "Predicts chronification"
          job_dissatisfaction: "Predicts chronification"
        risk_impact: "STarT Back tool yellow flags predict chronification"
        evidence: T1

    underwriting_responses:
      accept:
        conditions:
          - "M51 without radiculopathy"
          - "Single episode >24 months ago"
          - "Full recovery"
          - "Sedentary occupation"
        evidence: T2
      loading:
        conditions:
          - "M51 with past radiculopathy"
          - "Conservatively treated"
          - "Remission >12 months"
          - "No surgery"
          - "Non-manual occupation"
        loading_range: [15, 30]
        evidence: T3
      loading_plus_exclusion:
        conditions:
          - "Post-surgery discectomy with good outcome >12 months"
          - "White-collar occupation"
        exclusion_type: "Musculoskeletal exclusion"
        evidence: T3
      decline:
        conditions:
          - "Chronic radiculopathy with ongoing medication"
          - "Multilevel disease with surgery history + heavy occupation"
          - "Failed back surgery syndrome"
        evidence: T3

    failure_modes:
      - type: missing_radiculopathy_distinction
        description: "Not distinguishing M51 (degeneration) from M51.1 (radiculopathy) — categorically different risk"
      - type: missing_occupation_data
        description: "Identical ICD history carries very different risk in a physiotherapist vs a software developer"
      - type: post_surgery_underestimation
        description: "Successful microdiscectomy outcome not always captured — algorithm may permanently flag surgical history without noting good recovery"
      - type: ignoring_psychosocial_flags
        description: "Psychosocial yellow flags never present in ICD codes; require physician report interpretation"

    lookback_standard_years: 5
    lookback_extended_years: 10
    lookback_extended_condition: "Multilevel disease or failed surgery"

  # ---------------------------------------------------------------------------

  non_specific_back_pain:
    cluster: musculoskeletal
    label: "Non-specific Back Pain"
    icd_codes: ["M54"]
    icd_subtypes:
      M54.4:
        severity: moderate
        label: "Ischialgie"
      M54.5:
        severity: low_to_moderate
        label: "Kreuzschmerz (LBP)"
      M54.6:
        severity: low
        label: "Schmerzen im BWS-Bereich"

    au_durations:
      acute_nonspecific:
        description: "Acute non-specific LBP — 90% resolve within 6 weeks"
        median_weeks: [1, 4]
        recurrence_rate: null
        evidence: T1
        source: "NVL Kreuzschmerz"
      recurrent:
        description: "Recurrent LBP (>=3 episodes within 12 months)"
        median_weeks: [6, 12]
        recurrence_rate: null
        recurrence_note: "Annual AU burden 6-12 weeks"
        evidence: T2
      chronic:
        description: "Chronic LBP (>12 weeks) — major driver of long-term disability"
        median_weeks: [8, 14]
        recurrence_rate: null
        recurrence_note: "Mean 8-14 weeks per year"
        evidence: T1
      ischialgia:
        description: "Ischialgia (M54.4) — distinguish from true radiculopathy (M51.1)"
        median_weeks: [4, 8]
        recurrence_rate: null
        evidence: T2

    prognostic_factors:
      - name: episode_count_and_chronicity
        type: categorical
        thresholds:
          isolated_acute: "Very different risk"
          recurrent: ">=3 episodes in 12 months"
          chronic: ">12 weeks duration"
        risk_impact: "Most important factors — isolated acute vs recurrent/chronic"
        evidence: T1

      - name: opioid_use
        type: boolean
        thresholds:
          present: true
        risk_impact: "Serious red flag indicating chronification and severity"
        evidence: T1

      - name: occupation_physical_load
        type: categorical
        thresholds:
          heavy_manual: "Strong causal and prognostic relationship"
        risk_impact: "Strong evidence for causal and prognostic relationship"
        evidence: T1

      - name: psychosocial_factors
        type: categorical
        thresholds:
          yellow_flags: "Same as disc pathology"
        risk_impact: "Catastrophising, depression, job dissatisfaction predict chronification"
        evidence: T1

      - name: imaging_findings
        type: categorical
        thresholds:
          no_structural_finding: "Favourable — rules out serious pathology"
        risk_impact: "Absence of structural finding on MRI is actually favourable"
        evidence: T2

    underwriting_responses:
      accept:
        conditions:
          - "Isolated M54 AU <2 weeks"
          - ">18 months ago"
          - "No recurrence"
          - "No chronic pattern"
        evidence: T2
      loading:
        conditions:
          - "2-3 episodes within 3 years"
          - "Total AU <8 weeks"
          - "No chronification markers"
        loading_range: [10, 20]
        evidence: T3
      exclusion:
        conditions:
          - "Recurrent pattern (>=3 episodes)"
          - "Chronic LBP diagnosis"
          - "Opioid use"
        exclusion_type: "Musculoskeletal exclusion"
        evidence: T3
      decline:
        conditions:
          - "Chronic LBP with permanent disability markers"
          - "Ongoing opioid therapy"
          - "Heavy manual occupation with multilevel changes"
        evidence: T3

    failure_modes:
      - type: overreaction
        description: "Single M54 episode from 4 years ago triggering loading — textbook overreaction"
      - type: missing_structural_distinction
        description: "Not distinguishing M54 (non-specific) from M51 (structural) — systematically different risk"
      - type: missing_recurrence_pattern
        description: "Three separate M54 AU episodes coded identically; algorithm may treat as one condition without counting episodes across years"
      - type: opioid_marker_absent
        description: "Opioid prescriptions for back pain may appear in medication section, not in ICD codes — integration gap"

    lookback_standard_years: 3
    lookback_extended_years: 5
    lookback_extended_condition: "Chronic pattern"

  # ---------------------------------------------------------------------------

  soft_tissue:
    cluster: musculoskeletal
    label: "Soft Tissue Disorders"
    icd_codes: ["M79"]
    icd_subtypes:
      M79.0:
        severity: low
        label: "Rheumatismus, nicht naeher bezeichnet"
      M79.1:
        severity: low
        label: "Myalgie"
      M79.2:
        severity: low
        label: "Neuralgie und Neuritis, nicht naeher bezeichnet"
      M79.3:
        severity: low
        label: "Panniculitis, nicht naeher bezeichnet"
      M79.7:
        severity: high
        label: "Fibromyalgie-Syndrom (FMS)"

    au_durations:
      general_m79_non_fms:
        description: "General M79 (non-FMS) — typically acute"
        median_weeks: [1, 3]
        recurrence_rate: null
        recurrence_note: "High recurrence but usually short individual episodes"
        evidence: T2
      fibromyalgia:
        description: "M79.7 Fibromyalgia — chronic condition"
        median_weeks: [6, 10]
        recurrence_rate: null
        recurrence_note: "Mean annual AU 6-10 weeks; 10-20% on long-term sick leave at any point"
        long_term_sick_leave_pct: [0.10, 0.20]
        evidence: T2
      fibromyalgia_psychiatric_comorbid:
        description: "Fibromyalgia with comorbid psychiatric disorder"
        median_weeks: [12, null]
        recurrence_rate: null
        recurrence_note: "AU burden may exceed 12 weeks annually"
        evidence: T2

    prognostic_factors:
      - name: fms_vs_nonspecific
        type: categorical
        thresholds:
          fms: "M79.7 — very different risk profile"
          non_specific: "Other M79 — much lower risk"
        risk_impact: "Must be separated — very different risk profiles"
        evidence: T2

      - name: comorbid_mood_disorder
        type: boolean
        thresholds:
          present: true
        risk_impact: "Near-universal in FMS; comorbid depression often drives AU more than pain itself"
        evidence: T2

      - name: fms_medication
        type: categorical
        thresholds:
          duloxetine: "Suggests confirmed FMS diagnosis"
          pregabalin: "Suggests confirmed FMS diagnosis"
          amitriptyline: "Suggests confirmed FMS diagnosis"
        risk_impact: "Central sensitisation medications suggest confirmed FMS"
        evidence: T2

      - name: functional_status
        type: categorical
        thresholds:
          full_time_employment: "Favourable marker in FMS"
        risk_impact: "Ability to maintain full-time employment = favourable marker"
        evidence: T3

    underwriting_responses:
      accept:
        conditions:
          - "Non-specific M79 (non-FMS)"
          - "Single episode"
          - "Resolved"
        evidence: T3
      loading:
        conditions:
          - "M79.7 FMS with stable full-time employment"
          - "No psychiatric comorbidity"
          - "Minimal medication"
        loading_range: null  # not specified in manual
        evidence: T3
      exclusion:
        conditions:
          - "FMS with moderate impact"
          - "Controlled comorbidities"
        exclusion_type: "Musculoskeletal exclusion"
        evidence: T3
      decline:
        conditions:
          - "FMS with severe functional impairment"
          - "Psychiatric comorbidity"
          - "Opioid or high-dose gabapentinoid use"
          - "Prior long-term sick leave"
        evidence: T3

    failure_modes:
      - type: uniform_m79_treatment
        description: "Treating all M79 codes uniformly — M79.1 myalgia and M79.7 FMS are categorically different risks"
      - type: missing_fms_via_medication
        description: "Duloxetine prescribed for FMS may not be linked to M79.7 in code data"
      - type: fms_comorbidity_blindness
        description: "Psychiatric and FMS codes often coded separately; algorithm summing both naively may not capture synergistic AU risk"

    lookback_standard_years: 3
    lookback_extended_years: 5
    lookback_extended_condition: "Chronic pattern"
    lookback_notes: "Lookback uses general musculoskeletal non-specific category from Part 3"

  # ---------------------------------------------------------------------------

  rheumatoid_arthritis:
    cluster: musculoskeletal
