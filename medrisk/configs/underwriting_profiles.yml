        description: "E11 with severe neuropathy or foot complications — amputation risk"
        median_weeks: null
        recurrence_rate: null
        recurrence_note: "Significant AU; amputation risk is long-term tail risk"
        evidence: T1
      renal_failure:
        description: "E11 with renal failure (diabetic nephropathy, CKD >=3)"
        median_weeks: null
        recurrence_rate: null
        recurrence_note: "Major long-term AU risk; dialysis = decline territory"
        evidence: T1

    prognostic_factors:
      - name: hba1c
        type: numeric
        thresholds:
          well_controlled: 7.0
          acceptable: 8.0
