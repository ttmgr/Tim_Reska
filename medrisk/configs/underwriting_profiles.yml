      E66.1:
        severity: variable
        label: "Arzneimittelinduzierte Adipositas"
      E66.8:
        severity: variable
        label: "Sonstige Adipositas"
      E66.9:
        severity: variable
        label: "Adipositas, nicht naeher bezeichnet"

    bmi_classes:
      class_i: {range: [30.0, 34.9], label: "Class I"}
      class_ii: {range: [35.0, 39.9], label: "Class II"}
      class_iii: {range: [40.0, null], label: "Class III (morbid)"}

    au_durations:
      class_i_no_comorbidities:
        description: "Class I obesity without comorbidities — modest AU elevation"
        median_weeks: [2, 4]
        recurrence_rate: null
        recurrence_note: "2-4 weeks/year above baseline"
        evidence: T2
      class_ii_iii:
        description: "Class II-III obesity — AU risk escalates rapidly"
        median_weeks: [4, 8]
        recurrence_rate: null
        recurrence_note: "4-8 weeks/year directly attributable"
        evidence: T2
      metabolic_syndrome:
        description: "Obesity + metabolic syndrome (E66 + hypertension + dyslipidaemia + impaired glucose)"
        median_weeks: null
        recurrence_rate: null
        recurrence_note: "Major AU driver"
        evidence: T1
      obesity_plus_msk:
        description: "Obesity + musculoskeletal — back and joint pain AU risk multiplied"
        median_weeks: null
        recurrence_rate: null
        evidence: T2

    prognostic_factors:
      - name: bmi_class
        type: categorical
        thresholds:
          class_i: "Modest elevation"
          class_ii: "Significant elevation"
          class_iii: "Dramatically elevated risk (BMI >=40)"
        risk_impact: "Class III = dramatically elevated; Class I = modest"
        evidence: T1

      - name: metabolic_syndrome_components
        type: integer
        thresholds:
          count: "Number and severity of associated metabolic risk factors"
        risk_impact: "Number and severity of components determines risk"
        evidence: T1

      - name: weight_trajectory
        type: categorical
        thresholds:
          losing: "Actively losing with intervention = favourable"
          gaining: "Gaining = unfavourable"
        risk_impact: "Very different outlook depending on trajectory"
        evidence: T2

      - name: bariatric_surgery
        type: boolean
        thresholds:
          successful_sustained: true
        risk_impact: "Successful bariatric surgery with sustained weight loss = favourable prognostic reversal"
        evidence: T1

      - name: sleep_apnoea
        type: categorical
        thresholds:
          cpap_adherent: "Positive marker"
          untreated_osa: "Highly impairing"
        risk_impact: "G47.3 near-universal in class II-III; CPAP adherence is positive marker; untreated OSA is highly impairing"
        evidence: T2

    underwriting_responses:
      loading_low:
        conditions:
          - "E66 Class I"
          - "No metabolic comorbidities"
        loading_range: null  # loading applied but range not specified
        evidence: T3
      loading_moderate:
        conditions:
          - "E66 Class II"
          - "1 metabolic comorbidity"
          - "No severe complications"
        loading_range: [20, 35]
        evidence: T3
      high_loading_or_exclusion:
        conditions:
          - "E66 Class III without bariatric surgery"
          - "Multiple comorbidities"
        evidence: T3
      decline:
        conditions:
          - "Class III + diabetes + hypertension + CAD combination"
          - "OSA non-adherent to treatment"
          - "BMI >45 + manual occupation"
        evidence: T3

    failure_modes:
      - type: bmi_self_report_bias
        description: "BMI from health questionnaire self-report; significant underreporting bias"
      - type: missing_comorbidity_cluster
        description: "E66 code alone gives little information; risk is in the comorbidity cluster"
      - type: missing_bariatric_surgery
        description: "L-code for bariatric surgery may be in medication/surgical history but not linked to current metabolic status in algorithm"

    lookback_standard_years: 3
    lookback_extended_years: 5
    lookback_extended_condition: "Class III obesity"
    lookback_notes: "Current BMI matters most — current metabolic status more important than historical code"

  # ---------------------------------------------------------------------------
  # 1.5 Neurological Conditions
  # ---------------------------------------------------------------------------

  ms:
    cluster: neurological
    label: "Multiple Sclerosis"
    icd_codes: ["G35"]
    icd_subtypes:
      G35:
        severity: high_to_very_high
        label: "Multiple Sklerose"

    disease_courses:
      rrms: {label: "Relapsing-remitting (RRMS)", onset_pct: 0.85}
      spms: {label: "Secondary progressive (SPMS)"}
      ppms: {label: "Primary progressive (PPMS)"}

    au_durations:
      rrms_low_activity:
        description: "RRMS, low disease activity, no disability — relapse AU 2-8 weeks per event"
        median_weeks: [2, 8]
        relapse_rate_untreated: [1.0, 2.0]
        relapse_rate_effective_dmt: [0.3, 0.5]
        evidence: T1
      rrms_high_efficacy_dmt:
        description: "RRMS on high-efficacy DMT (natalizumab, ocrelizumab) — approach near-normal in best-case"
        median_weeks: null
        recurrence_rate: null
        recurrence_note: "AU substantially reduced"
        evidence: T1
      spms_ppms:
        description: "SPMS/PPMS — progressive disability accumulation; permanent disability common"
        median_weeks: null
        recurrence_rate: null
        recurrence_note: "Long-term AU risk very high"
        evidence: T1
      edss_0_to_2_5:
        description: "EDSS 0-2.5 (minimal disability) — near-normal work function"
        median_weeks: null
        recurrence_rate: null
        evidence: T2
      edss_gte_3:
        description: "EDSS >=3.0 — meaningful functional impairment; AU escalates with each EDSS step"
        median_weeks: null
        recurrence_rate: null
        evidence: T1

    prognostic_factors:
      - name: edss
        type: numeric
        thresholds:
          minimal: 2.5
          meaningful_impairment: 3.0
        risk_impact: "Most important single functional marker (0-10 scale)"
        evidence: T1

      - name: disease_course
        type: categorical
        thresholds:
          rrms: "Better prognosis"
          spms: "Progressive"
          ppms: "Progressive"
        risk_impact: "RRMS vs SPMS vs PPMS — fundamentally different trajectories"
        evidence: T1

      - name: dmt_level
        type: categorical
        thresholds:
          none: "Untreated"
          platform: "Interferons, glatiramer"
          high_efficacy: "Natalizumab, alemtuzumab, ocrelizumab"
        risk_impact: "DMT level reflects disease severity and treatment intent"
        evidence: T1

      - name: relapse_rate
        type: numeric
        thresholds:
          threshold_years: 2
        risk_impact: "Relapse rate over past 2 years on current therapy"
        evidence: T1

      - name: mri_activity
        type: boolean
        thresholds:
          gadolinium_enhancing: true
        risk_impact: "Gadolinium-enhancing lesions indicate active inflammation"
        evidence: T1

      - name: time_since_last_relapse
        type: numeric
        thresholds: {}
        risk_impact: "Longer = more favourable"
        evidence: T2

      - name: age_at_onset
        type: numeric
        thresholds: {}
        risk_impact: "Younger onset = longer exposure but sometimes more benign RRMS course"
        evidence: T2

      - name: sphincter_cognitive_involvement
        type: boolean
        thresholds:
          present: true
        risk_impact: "Very poor prognostic markers for occupational function"
        evidence: T1

    underwriting_responses:
      postpone:
        conditions:
          - "Newly diagnosed MS"
          - "Treatment just initiated"
          - "Insufficient data on disease activity"
        duration_months: [36, 60]
        evidence: T3
      loading_plus_exclusion:
        conditions:
          - "RRMS"
          - "EDSS 0-1.5"
          - "On effective DMT"
          - "0 relapses in past 2 years"
          - ">3 years stable"
        exclusion_type: "Neurological exclusion"
        loading_range: null  # high loading implied
        evidence: T3
      exclusion_only:
        conditions:
          - "RRMS"
          - "EDSS <=2.5"
          - "Low disease activity"
        exclusion_type: "Neurological exclusion"
        evidence: T3
      decline:
        conditions:
          - "EDSS >=3.0"
          - "SPMS/PPMS"
          - "Active relapses"
          - "High MRI burden"
          - "Cognitive or sphincter involvement"
        evidence: T3

    failure_modes:
      - type: uniform_g35
        description: "Treating all G35 as equal — newly diagnosed RRMS EDSS 0 vs SPMS EDSS 4 are not comparable"
      - type: no_edss_access
        description: "The most important clinical variable is almost never present in administrative data"
      - type: dmt_level_proxy
        description: "High-efficacy DMT prescription (natalizumab = hospital prescription) vs platform therapy can sometimes be inferred — underutilised signal"

    lookback_standard_years: null  # lifetime
    lookback_extended_years: null  # lifetime
    lookback_extended_condition: "Chronic progressive; no time decay"

  # ---------------------------------------------------------------------------

  migraine:
    cluster: neurological
    label: "Migraine"
    icd_codes: ["G43", "G44.2"]
    icd_subtypes:
      G43.0:
        severity: low_to_moderate
        label: "Migräne ohne Aura"
      G43.1:
        severity: moderate
        label: "Migräne mit Aura"
      G43.3:
        severity: high
        label: "Komplizierte Migräne"
      G43.8:
        severity: variable
        label: "Sonstige Migräne"
      G43.9:
        severity: variable
        label: "Migräne, nicht naeher bezeichnet"
      G44.2:
        severity: low
        label: "Spannungskopfschmerz (lower risk)"
      G44.4:
        severity: high
        label: "Medikamenteninduzierter Kopfschmerz (MOH)"

    au_durations:
      episodic_low_frequency:
        description: "Episodic migraine, 1-4 attacks/month, good triptan response"
        median_days: [5, 15]
        recurrence_rate: null
        recurrence_note: "AU 5-15 days/year"
        evidence: T2
      high_frequency_episodic:
        description: "High-frequency episodic migraine (8-14 days/month)"
        median_days: [20, 40]
        recurrence_rate: null
        recurrence_note: "AU 20-40 days/year"
        evidence: T2
      chronic:
        description: "Chronic migraine (>=15 days/month) — major AU driver"
        median_days: [60, 80]
        recurrence_rate: null
        recurrence_note: "Up to 60-80 days/year"
        evidence: T2
      migraine_with_aura:
        description: "Migraine with aura — higher stroke risk especially in women on OCP"
        median_days: null
        recurrence_rate: null
        evidence: T1

    prognostic_factors:
      - name: attack_frequency
        type: numeric
        thresholds:
          low: 4
          high_frequency: 14
          chronic: 15
        risk_impact: "Most important KTG factor; attacks per month must be established"
        evidence: T1

      - name: triptan_responsiveness
        type: categorical
        thresholds:
          good: "Manageable AU"
          medication_overuse_headache: "Chronic pattern = major red flag"
        risk_impact: "Good triptan response = manageable; MOH (G44.4) = chronification"
        evidence: T1

      - name: preventive_therapy
        type: boolean
        thresholds:
          on_preventive: true
        risk_impact: "Use of beta-blocker, topiramate, CGRP antagonists suggests significant disease burden"
        evidence: T2

      - name: medication_overuse_headache
        type: boolean
        thresholds:
          present: true
        risk_impact: "Paradoxically worsens migraine; indicator of chronification and poor management"
        evidence: T1

      - name: comorbid_depression_anxiety
        type: boolean
        thresholds:
          present: true
        risk_impact: "Extremely common with chronic migraine; amplifies AU"
        evidence: T2

    underwriting_responses:
      accept:
        conditions:
          - "Episodic migraine <=4 days/month"
          - "Good acute medication response"
          - "No preventive medication required"
        evidence: T2
      loading:
        conditions:
          - "Episodic migraine 5-8 days/month"
          - "On preventive therapy"
          - "No MOH"
        loading_range: [10, 20]
        evidence: T3
      loading_plus_exclusion:
        conditions:
          - "High-frequency episodic migraine 8-14 days/month"
          - "No chronic conversion"
        exclusion_type: "Neurological exclusion"
        evidence: T3
      decline_or_exclusion_only:
        conditions:
          - "Chronic migraine >=15 days/month"
          - "MOH"
          - "Occupations where sudden incapacity is dangerous"
        evidence: T3

    failure_modes:
      - type: frequency_not_captured
        description: "G43 coding frequency not captured — all G43 patients appear identical regardless of 2 vs 20 attacks/month; the most critical variable is not in the code"
      - type: missing_moh
        description: "Medication overuse headache may be coded G44.4 or not at all — algorithms miss it"
      - type: overreaction_single_g43
        description: "Patients with 1-2 migraines per year are normal-risk for KTG; algorithm flagging all G43 is a major overreaction failure mode"

    lookback_standard_years: 3
    lookback_extended_years: 5
    lookback_extended_condition: "Chronic pattern history"

  # ---------------------------------------------------------------------------

  epilepsy:
    cluster: neurological
    label: "Epilepsy"
    icd_codes: ["G40", "G41"]
    icd_subtypes:
      G40.0:
        severity: variable
        label: "Lokalisationsbezogene idiopathische Epilepsie"
      G40.1:
        severity: variable
        label: "Lokalisationsbezogene symptomatische Epilepsie"
      G40.2:
        severity: variable
        label: "Lokalisationsbezogene kryptogene Epilepsie"
      G40.3:
        severity: variable
        label: "Generalisierte idiopathische Epilepsie"
      G40.4:
        severity: variable
        label: "Sonstige generalisierte Epilepsie"
      G40.5:
        severity: variable
        label: "Spezielle epileptische Syndrome"
      G40.6:
        severity: variable
        label: "Grand-mal-Anfaelle, nicht naeher bezeichnet"
      G40.9:
        severity: variable
        label: "Epilepsie, nicht naeher bezeichnet"
      G41:
        severity: very_high
        label: "Status epilepticus"

    au_durations:
      seizure_free_24_months:
        description: "Seizure-free >=24 months on monotherapy — minimal direct AU"
        median_weeks: null
        recurrence_rate: null
        recurrence_note: "Primary risk is occupational restriction"
        evidence: T2
      active_seizures:
        description: "Active seizures (>=1/year) — AU per seizure event 1-4 weeks"
        median_weeks: [1, 4]
        recurrence_rate: null
        recurrence_note: "Risk of status epilepticus adds tail risk"
        evidence: T2
      refractory:
        description: "Refractory epilepsy (>=2 adequate drugs failed) — significant AU"
        median_weeks: null
        recurrence_rate: null
        recurrence_note: "Surgery consideration"
        evidence: T1

    prognostic_factors:
      - name: seizure_free_duration
        type: numeric
        thresholds:
          meaningful_months: 24
        risk_impact: "Most important marker; >=24 months = meaningful threshold"
        evidence: T1

      - name: aed_count
        type: integer
        thresholds:
          monotherapy: 1
          polytherapy: 2
        risk_impact: "Monotherapy vs polytherapy is a strong proxy for disease control"
        evidence: T1

      - name: driving_licence_status
        type: categorical
        thresholds:
          revoked: "Objective marker of insufficient seizure control"
          intact: "Favourable"
        risk_impact: "Revoked licence = objective marker of insufficient control"
        evidence: T2

      - name: seizure_type
        type: categorical
        thresholds:
          focal: "Lower injury risk"
          generalised_tonic_clonic: "More injury risk"
        risk_impact: "Generalised tonic-clonic carries more injury risk"
        evidence: T1

      - name: epilepsy_syndrome
        type: categorical
        thresholds:
          idiopathic_generalised: "Better prognosis"
          focal_symptomatic: "Worse prognosis"
        risk_impact: "Idiopathic generalised epilepsies have better prognosis"
        evidence: T1

      - name: occupation
        type: categorical
        thresholds:
          safety_critical: "Work at heights, driving, machinery"
        risk_impact: "Major occupational restriction implications"
        evidence: T1

    underwriting_responses:
      loading:
        conditions:
          - "Seizure-free >=24 months"
          - "Monotherapy"
          - "Driving licence intact"
          - "No occupational restriction required"
        loading_range: null  # loading applied, range not specified
        evidence: T3
      exclusion:
        conditions:
          - "Seizure-free >=12 months"
          - "Well-tolerated medication"
          - "Non-safety-critical occupation"
        exclusion_type: "Neurological exclusion"
        evidence: T3
      postpone:
        conditions:
          - "Newly initiated AED"
          - "Seizure frequency not yet established"
        duration_months: [12, 12]
        evidence: T3
      decline:
        conditions:
          - "Refractory epilepsy"
          - "Frequent seizures"
          - "Safety-critical occupation"
          - "Status epilepticus history"
        evidence: T3

    failure_modes:
      - type: missing_aed_count
        description: "Polypharmacy is a strong severity proxy; algorithms without medication integration miss this entirely"
      - type: missing_driving_status
        description: "Licence revocation is an objective external severity marker, available only from questionnaire free text"
      - type: overreacting_childhood_epilepsy
        description: "Juvenile absence epilepsy with adult remission is fundamentally different from adult-onset focal epilepsy"

    lookback_standard_years: 5
    lookback_extended_years: null  # lifetime if refractory
    lookback_extended_condition: "Refractory epilepsy"
