      I25.1:
        severity: high
        label: "Atherosklerotische Herzkrankheit mit Angina pectoris"
      I25.5:
        severity: very_high
        label: "Ischämische Kardiomyopathie"
      I21:
        severity: very_high
        label: "Akuter Myokardinfarkt (Z.n.)"
      I22:
        severity: very_high
        label: "Rezidivierender Myokardinfarkt (Z.n.)"

    au_durations:
      stable_cad_no_mi:
