        severity: high
        label: "Chronisch / permanent"
      I48.9:
        severity: variable
        label: "Nicht naeher bezeichnet"

    au_durations:
      lone_paroxysmal:
        description: "Lone paroxysmal AF in young patient, structurally normal heart"
