        exclusion_type: "Metabolic exclusion"
        evidence: T3
      decline:
        conditions:
          - "HbA1c >9.0%"
          - "Macrovascular complications"
          - "CKD >=3"
          - "Insulin + complication cluster"
          - "Heavy manual occupation"
        evidence: T3

