      - type: missing_comorbidity_context
        description: "AF risk is almost entirely determined by comorbidities; AF ICD code alone cannot generate a meaningful underwriting decision"
      - type: anticoagulation_blind_spot
        description: "DOAC prescription for AF is a clinically important marker that algorithms without medication integration miss"

    lookback_standard_years: 5
    lookback_extended_years: null  # lifetime if permanent
    lookback_extended_condition: "Permanent AF"

