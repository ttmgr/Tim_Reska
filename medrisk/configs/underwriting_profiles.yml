        recurrence_rate: null
        recurrence_note: "Per year for cardioversion or monitoring; minimal AU"
        evidence: T2
      af_comorbid_cardiac:
        description: "AF with comorbid cardiac disease (heart failure, valvular)"
        median_weeks: null
        recurrence_rate: null
        recurrence_note: "AU driven by underlying condition"
        evidence: T1
      af_stroke:
        description: "AF with stroke event"
        median_weeks: [4, 24]
        recurrence_rate: null
        recurrence_note: "Ongoing disability possible"
        evidence: T2

    prognostic_factors:
      - name: af_subtype
        type: categorical
        thresholds:
          paroxysmal_i480: "Less risk"
          permanent_i482: "Implies less cardiovascular reserve"
        risk_impact: "Permanent AF implies less cardiovascular reserve"
        evidence: T1

      - name: cha2ds2_vasc
        type: integer
        thresholds:
          low: 0
          moderate: [1, 2]
          high: 3
        risk_impact: "Stroke risk stratification — each additional point = elevated risk"
        evidence: T1

      - name: anticoagulation
        type: boolean
        thresholds:
          on_oac: true
        risk_impact: "OAC (DOAC/warfarin) on board = stroke prevention — favourable marker"
        evidence: T1

      - name: underlying_cardiac_disease
        type: boolean
        thresholds:
          structural: true
        risk_impact: "Structural heart disease (reduced EF, valvular, hypertrophic) = much higher risk than lone AF"
        evidence: T1

      - name: ablation
        type: boolean
        thresholds:
          successful_sinus_rhythm: true
        risk_impact: "Successful catheter ablation with maintained sinus rhythm = favourable"
        evidence: T2

      - name: thyroid_induced
        type: boolean
        thresholds:
          hyperthyroid: true
        risk_impact: "Hyperthyroid-induced AF resolves with treatment — unique self-limiting subgroup"
        evidence: T2

    underwriting_responses:
      accept:
        conditions:
          - "Lone paroxysmal AF"
          - "Structurally normal heart"
          - "Low CHA2DS2-VASc"
          - "Rate-controlled"
          - "Anticoagulated if indicated"
        evidence: T3
      loading:
        conditions:
          - "Persistent/permanent AF"
          - "CHA2DS2-VASc 1-2"
          - "No significant comorbidity"
        loading_range: [20, 35]
        evidence: T3
      loading_or_exclusion:
        conditions:
          - "AF + 1-2 comorbidities (hypertension, diabetes, mild heart failure)"
