        evidence: T1

      - name: complications
        type: categorical
        thresholds:
          microvascular: "Retinopathy, nephropathy, neuropathy"
          macrovascular: "CAD, PAD, stroke"
        risk_impact: "Presence of micro- or macrovascular complications dramatically elevates risk"
        evidence: T1

      - name: medication_escalation
        type: categorical
        thresholds:
          diet_only: "Earliest stage"
          metformin: "First-line oral"
          dual_oral: "Escalation"
          insulin: "Most advanced — insulin pump = most intensive"
        risk_impact: "Medication escalation is a proxy for disease progression"
        evidence: T1

      - name: insulin_use
        type: boolean
        thresholds:
          any_insulin: true
        risk_impact: "Any insulin = more advanced disease; pump = most advanced"
        evidence: T1

      - name: duration_years
        type: numeric
        thresholds:
          elevated_risk: 10
        risk_impact: ">10 years = higher cumulative complication risk even if currently controlled"
        evidence: T1

      - name: comorbid_hypertension
        type: boolean
        thresholds:
          present: true
        risk_impact: "Near-universal in T2DM; combination is greater than additive for KTG"
        evidence: T1

      - name: obesity
        type: boolean
        thresholds:
          present: true
        risk_impact: "Exacerbates insulin resistance; weight loss can reverse early T2DM"
        evidence: T1

    underwriting_responses:
      loading_low:
        conditions:
          - "E11.9"
          - "HbA1c <7.5%"
          - "Diet or metformin only"
          - "No complications"
          - "<5 years duration"
          - "BMI <30"
        loading_range: [15, 25]
        evidence: "T2/T3"
      loading_moderate:
        conditions:
          - "E11.9"
          - "HbA1c 7.5-8.0%"
          - "2 oral agents"
          - "Mild microalbuminuria"
          - "<10 years duration"
        loading_range: [25, 50]
        evidence: T3
      exclusion_or_high_loading:
