        description: "Treating all E11 as uniform risk — E11.9 uncomplicated on metformin vs E11.7 multiple complications are not comparable"
      - type: hba1c_not_extracted
        description: "HbA1c is routinely available in questionnaires and reports but algorithms often treat it as free text, failing to extract it"
      - type: missing_medication_escalation
        description: "Oral hypoglycaemic drug count is a powerful proxy for disease progression"
      - type: underestimating_t2dm_hypertension
        description: "Algorithms treating T2DM + hypertension as additive underestimate synergistic KTG risk"

    lookback_standard_years: 5
    lookback_extended_years: null  # lifetime if complications
    lookback_extended_condition: "Established complications"

