      post_mi_reduced_ef:
        description: "Post-MI, reduced EF (<40%) — heart failure trajectory"
        median_weeks: null
        recurrence_rate: null
        recurrence_note: "Significantly elevated long-term AU"
        evidence: T1
      post_cabg:
        description: "Post-CABG — return to work 8-16 weeks"
        median_weeks: [8, 16]
        recurrence_rate: null
        recurrence_note: "Long-term AU depends on residual disease and EF"
        evidence: T2
      post_pci:
        description: "Post-PCI (stent) if uncomplicated — return to work 2-6 weeks"
        median_weeks: [2, 6]
        recurrence_rate: null
        evidence: T2

    prognostic_factors:
      - name: lvef
        type: numeric
        thresholds:
          preserved: 50
          significantly_impaired: 40
        risk_impact: "Most important single prognostic parameter; >50% preserved, <40% significantly impaired"
        evidence: T1

      - name: vessel_count
        type: integer
        thresholds:
          single_vessel: 1
          multi_vessel: 2
        risk_impact: "Single-vessel vs multi-vessel disease"
        evidence: T1

      - name: revascularisation_status
        type: categorical
        thresholds:
          complete: "Favourable"
          incomplete: "Elevated residual risk"
        risk_impact: "Complete vs incomplete revascularisation"
        evidence: T1

      - name: post_event_medication_adherence
        type: boolean
        thresholds:
          full_regimen: true
        risk_impact: "Dual antiplatelet, statin, ACE inhibitor — full regimen is favourable marker"
        evidence: T1

      - name: residual_angina
        type: integer
        thresholds:
          ccs_class_elevated: 2
        risk_impact: "CCS class >=2 angina = elevated risk"
        evidence: T1

      - name: comorbidities
        type: categorical
        thresholds:
          diabetes: "Multiplicative risk"
          renal_failure: "Multiplicative risk"
          hypertension: "Multiplicative risk"
        risk_impact: "Diabetes, renal failure, hypertension — multiplicative risk"
        evidence: T1

    underwriting_responses:
      loading:
        conditions:
          - "Stable CAD, no MI"
          - "EF >55%"
          - "Fully revascularised PCI"
          - "Sedentary occupation"
          - "Optimal medication"
          - ">12 months stable"
        loading_range: [25, 50]
        evidence: T3
      loading_or_exclusion:
        conditions:
          - "Post-MI with preserved EF"
          - ">24 months stable"
          - "Full revascularisation"
        exclusion_type: "Cardiac exclusion"
        evidence: T3
      postpone:
        conditions:
          - "Recent MI or CABG <24 months"
        duration_months: [24, 24]
        evidence: T3
      decline:
        conditions:
          - "Reduced EF (<40%)"
          - "Multi-vessel unrevascularised disease"
          - "CCS >=2 angina"
          - "Ischaemic cardiomyopathy"
        evidence: T3

    failure_modes:
      - type: homogeneous_i25
        description: "Treating I25 as a homogeneous block — I25.0 (atherosclerosis, no symptoms) is very different from I25.5 (ischaemic cardiomyopathy)"
      - type: no_lvef_data
        description: "Algorithms rarely receive echocardiographic data — major gap between ICD-coded risk and functional reality"
      - type: post_pci_underestimation
        description: "Algorithm may not distinguish complete revascularisation from incomplete; the residual disease burden is the key variable"

    lookback_standard_years: 5
    lookback_extended_years: null  # lifetime
    lookback_extended_condition: "Cardiovascular events are landmark events; never fully decay"

