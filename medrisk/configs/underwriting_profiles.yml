      M06:
        severity: moderate_to_high
        label: "Sonstige rheumatoide Arthritis (inkl. seronegative) — heterogeneous"

    au_durations:
      active_unoptimised:
        description: "Active RA without optimal treatment"
        median_weeks: [8, 20]
        recurrence_rate: null
        recurrence_note: "Multiple flares per year possible"
        evidence: T2
      remission_on_dmards:
        description: "RA in remission on DMARDs"
        median_weeks: [2, 4]
        recurrence_rate: null
        recurrence_note: "Annual AU in well-controlled patients"
        evidence: T2
        source: "ACR/EULAR treat-to-target data"
      on_biologics:
        description: "RA on biologics (anti-TNF etc.) — remission rates 40-60%"
        median_weeks: null
        remission_rate: [0.40, 0.60]
        evidence: T1
      erosive:
        description: "RA with joint erosions/deformities — permanent functional limitation"
        median_weeks: null
        recurrence_rate: null
        recurrence_note: "Elevated long-term AU"
        evidence: T1

    prognostic_factors:
      - name: das28
        type: numeric
        thresholds:
          remission: 2.6
        risk_impact: "DAS28 <2.6 = clinical remission criterion; not in application data but requestable"
        evidence: T1

      - name: seropositivity
        type: categorical
        thresholds:
          seropositive_m05: "More erosive course"
          seronegative_m06: "Heterogeneous"
        risk_impact: "Seropositive RA has more erosive course — M05 vs M06 is meaningful"
        evidence: T1

      - name: medication_level
        type: categorical
        thresholds:
          hydroxychloroquine_methotrexate: "Mono csDMARD"
          combination_csdmards: "Escalation — higher severity"
          biologics_jak_inhibitors: "Most advanced — reflects high severity"
        risk_impact: "Medication escalation reflects disease severity"
        evidence: T1

      - name: joint_erosions_deformities
        type: boolean
        thresholds:
          present: true
        risk_impact: "Radiological finding indicating irreversible damage — very negative"
        evidence: T1

      - name: extra_articular_manifestations
        type: boolean
        thresholds:
          present: true
        risk_impact: "Felty syndrome, pulmonary RA = systemic severe disease"
        evidence: T1

      - name: comorbid_cardiovascular
        type: boolean
        thresholds:
          present: true
        risk_impact: "RA independently elevates CV risk by 50%"
        evidence: T1

    underwriting_responses:
      loading:
        conditions:
          - "RA in clinical remission >12 months"
          - "DAS28 <2.6"
          - "Stable DMARD"
          - "No erosions"
          - "White-collar occupation"
        loading_range: [20, 40]
        evidence: T3
      loading_plus_exclusion:
        conditions:
          - "Active disease"
          - "Moderate severity"
          - "Responsive to treatment"
        exclusion_type: "Musculoskeletal exclusion"
        evidence: T3
      postpone:
        conditions:
          - "Newly diagnosed RA awaiting treatment response assessment"
        evidence: T3
      decline:
        conditions:
          - "Severe erosive RA"
          - "Biologic escalation with incomplete response"
          - "Significant functional limitation"
          - "Manual occupation"
        evidence: T3

    failure_modes:
      - type: missing_seropositive_distinction
        description: "Not distinguishing M05 (seropositive, more severe) from M06 (seronegative, heterogeneous) — coding difference carries clinical weight"
      - type: missing_medication_escalation
        description: "Biologic prescription should be a strong risk escalation trigger that ICD codes alone do not capture"
      - type: underestimating_cv_comorbidity
        description: "RA itself is a CV risk multiplier — underestimating CV comorbidity risk in RA"

    lookback_standard_years: 5
    lookback_extended_years: null  # lifetime if active
    lookback_extended_condition: "Active disease"

  # ---------------------------------------------------------------------------
  # 1.3 Cardiovascular Conditions
  # ---------------------------------------------------------------------------

  hypertension:
    cluster: cardiovascular
    label: "Hypertension"
    icd_codes: ["I10", "I11", "I12", "I13"]
    icd_subtypes:
      I10:
        severity: low_to_moderate
        label: "Essentielle Hypertonie"
      I11:
        severity: high
        label: "Hypertensive Herzkrankheit"
      I12:
        severity: high
        label: "Hypertensive Nierenkrankheit"
      I13:
        severity: very_high
        label: "Hypertensive Herz- und Nierenkrankheit"

    au_durations:
      controlled_no_organ_damage:
        description: "Controlled I10 without organ damage — minimal direct AU impact"
        median_weeks: null
        recurrence_rate: null
        recurrence_note: "Most AU arises from comorbidities or treatment side-effects"
        evidence: T2
      hypertensive_crisis:
        description: "Hypertensive crisis or emergency — rare in well-managed patients"
        median_weeks: [1, 4]
        recurrence_rate: null
        evidence: T2
      organ_involvement:
        description: "I11/I12/I13 — AU driven by cardiac or renal complications"
        median_weeks: null
        recurrence_rate: null
        recurrence_note: "AU driven by complications rather than hypertension per se"
        evidence: T1

    prognostic_factors:
      - name: bp_control
        type: categorical
        thresholds:
          controlled: "Last documented BP reading within range"
          uncontrolled: "Elevated despite medication"
        risk_impact: "Blood pressure control and number of agents required"
        evidence: T2

      - name: antihypertensive_agent_count
        type: integer
        thresholds:
          mild: 1
          moderate: [2, 3]
          high_risk: 4
        risk_impact: "1 drug = mild; 2-3 = moderate; >=4 or resistant = high risk"
        evidence: T2

      - name: target_organ_damage
        type: categorical
        thresholds:
          lvh: "Left ventricular hypertrophy"
          microalbuminuria: "Renal marker"
          retinopathy: "Eye damage"
          ckd: "Chronic kidney disease"
        risk_impact: "LVH, microalbuminuria, retinopathy, CKD stage — all elevate risk"
        evidence: T1

      - name: metabolic_comorbidities
        type: boolean
        thresholds:
          present: true
        risk_impact: "Diabetes + hypertension = major risk multiplier"
        evidence: T1

      - name: age_at_diagnosis
        type: numeric
        thresholds:
          early_onset: 40
        risk_impact: "Early-onset (<40 years) implies longer exposure and higher lifetime complication risk"
        evidence: T2

    underwriting_responses:
      accept:
        conditions:
          - "Isolated I10"
          - "Well-controlled on 1-2 agents"
          - "No organ damage"
          - "No metabolic comorbidity"
        evidence: T2
      loading:
        conditions:
          - "2-3 antihypertensive agents"
          - "OR mild microalbuminuria"
          - "OR hypertension + one metabolic factor"
        loading_range: [15, 30]
        evidence: T3
      loading_or_exclusion:
        conditions:
          - "Hypertensive heart disease (I11)"
          - "Moderate CKD"
          - "Resistant hypertension"
        evidence: T3
      decline:
        conditions:
          - "Malignant hypertension"
          - "I11/I12/I13 with significant organ damage"
          - "Multiple high-risk comorbidities"
        evidence: T3

    failure_modes:
      - type: uniform_i10
        description: "Treating all I10 codes as equal risk — controlled single-agent hypertension is near-normal KTG risk"
      - type: ignoring_medication_data
        description: "Number of antihypertensives required is the most powerful proxy for severity available in application data"
      - type: missing_organ_damage_codes
        description: "Missing I11/I12/I13 distinction — hypertension-with-organ-damage codes carry materially higher risk than pure I10"

    lookback_standard_years: 3
    lookback_extended_years: 5
    lookback_extended_condition: "Organ damage present"

