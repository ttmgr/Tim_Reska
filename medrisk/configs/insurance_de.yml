# German GKV (statutory health insurance) parameters for Krankentagegeld (KTG) modelling.
# Sources:
#   - §44 SGB V (Krankengeld)
#   - §3 EFZG (Lohnfortzahlung)
#   - Beitragsbemessungsgrenze 2024: 59,850 €/yr → 4,987.50 €/month
#   - Federal Health Report (Bundesgesundheitsreport 2023)
#   - BAuA / Bundesanstalt für Arbeitsschutz und Arbeitsmedizin sick-leave statistics

statutory:
  lohnfortzahlung_weeks: 6           # §3 EFZG: employer pays 100 % for first 6 weeks
  krankengeld_pct_gross: 0.70        # §44 SGB V: 70 % of gross income
  krankengeld_pct_net: 0.90          # §44 SGB V: capped at 90 % of net income
  bbg_monthly_eur: 4987.50           # 2024 Beitragsbemessungsgrenze (monthly)
  # max daily Krankengeld = 4987.50 * 0.70 / 30 = 116.38 €
  max_krankengeld_weeks: 78          # §48 SGB V: total incl. Lohnfortzahlung
  karenzzeit_gkv_days: 42            # 6 weeks employer Lohnfortzahlung before GKV Krankengeld

ktg_product_defaults:
  daily_benefit_eur: 50              # typical private KTG insured daily benefit
  karenzzeit_days: 3                 # typical private KTG waiting period (days)
  max_benefit_days: 730              # typical maximum benefit duration

occupational_classes:
  # Berufsgruppen used by German private insurers
  1: {label: "low_risk",       risk_factor: 1.00}   # sedentary / clerical
  2: {label: "medium_risk",    risk_factor: 1.25}   # light manual / sales
  3: {label: "high_risk",      risk_factor: 1.60}   # skilled trades / nursing
  4: {label: "very_high_risk", risk_factor: 2.10}   # heavy manual / construction

actuarial:
  reserve_interest_rate: 0.0075    # 0.75 % p.a. (German Alterungsrückstellung standard)
  nb_overdispersion_alpha: 0.45    # NegBin overdispersion α (calibrated to GKV data)

# GKV reference sick-leave table
# Columns: age_mid, sex (M/F), episodes_per_year, sick_days_per_year
