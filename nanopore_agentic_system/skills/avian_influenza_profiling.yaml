name: avian_influenza_profiling
display_name: Avian Influenza Profiling
domain: Veterinary & Zoonotic Surveillance (Virome)
description: >-
  Avian influenza virus (AIV) characterization across the latest RNA and DNA
  Nanopore chemistries. Provides chemistry-specific basecalling (direct RNA002,
  RNA004, cDNA, and RNA004 with m6A modification), de novo assembly (Flye /
  metaFlye + Minimap2/Racon polishing + per-contig blastn), and reference-based
  consensus generation against an AIV segment database (Minimap2 best-reference
  selection, BCFtools and iVar consensus), plus IRMA influenza-specific assembly.
  Route here for viral subtyping/consensus of AIV from environmental or clinical
  RNA/DNA, benchmarking sequencing approaches.
supported_input_types:
  - pod5
  - fast5
  - fastq
tools:
  - name: dorado
    version: ">=0.7 (manual install)"
    purpose: Basecalling RNA004 and m6A-modified RNA004.
    url: https://github.com/nanoporetech/dorado
  - name: guppy_basecaller
    version: "ONT legacy (login); deprecated upstream"
    purpose: Basecalling RNA002 (rna_r9.4.1_70bps_hac) and cDNA (dna_r10.4.1_e8.2_400bps_hac).
    url: https://github.com/nanoporetech/dorado
  - name: seqkit
    version: ">=2.8.0"
    purpose: Minimum-length read filtering (seqkit seq -m 50).
    url: https://github.com/shenwei356/seqkit
  - name: flye
    version: ">=2.9.4"
    purpose: De novo assembly (--nano-raw; --meta for complex samples).
    url: https://github.com/mikolmogorov/Flye
  - name: minimap2
    version: ">=2.28"
    purpose: Alignment to AIV segment references; polishing alignment.
    url: https://github.com/lh3/minimap2
  - name: racon
    version: ">=1.5.0"
    purpose: De novo assembly polishing.
    url: https://github.com/isovic/racon
  - name: samtools
    version: ">=1.19"
    purpose: BAM view/sort/index, idxstats, faidx, mpileup.
    url: https://github.com/samtools/samtools
  - name: bcftools
    version: ">=1.19"
    purpose: Variant calling and consensus (mpileup/call/consensus).
    url: https://github.com/samtools/bcftools
  - name: ivar
    version: "documented in README; not in unified environment.yaml (install separately)"
    purpose: Alternative consensus generation.
    url: https://github.com/andersen-lab/ivar
  - name: IRMA
    version: ">=1.1.4 (install separately)"
    purpose: Influenza-specific iterative consensus assembly.
    url: https://github.com/peterk87/irma
  - name: blastn
    version: "BLAST+ (not in unified environment.yaml; install separately)"
    purpose: Per-contig identification against a reference db in the de novo scripts.
    url: https://blast.ncbi.nlm.nih.gov/
required_databases:
  - name: AIV segment reference database
    note: Per-segment FASTA references (PB2 PB1 PA HA NA NP M NS); user-provided.
  - name: BLAST reference database
    note: Prepared with makeblastdb for the de novo per-contig blastn step.
parameters:
  - name: input_dir
    required: true
    description: POD5/FAST5 (basecalling) or FASTQ directory, depending on step.
  - name: output_fastq
    required: true
    description: Basecalled FASTQ output path (RNA004/cDNA/RNA002).
  - name: output_bam
    required: true
    description: Basecalled BAM output (m6A-modified RNA004 run).
  - name: rna004_model
    required: false
    default: rna004_130bps_hac@v3.0.1
    description: Dorado RNA004 model (verbatim from base_calling_RNA004.sh). See needs_review re hac vs sup.
  - name: rna004_base_model
    required: false
    default: rna004_130bps_sup@v3.0.1
    description: Dorado base model for m6A run (verbatim from RNA_mod_base_calling_dRNA004.sh).
  - name: rna004_mod_model
    required: false
    default: rna004_130bps_sup@v3.0.1_m6A_DRACH@v1
    description: Dorado m6A modification model (verbatim).
  - name: reference_fasta
    required: true
    description: AIV reference (segment db FASTA or single reference for m6A --reference).
  - name: reads_fastq
    required: true
    description: Reads entering assembly/reference-based steps.
  - name: filtered_fastq
    required: false
    default: filtered.fastq
    description: seqkit length-filtered reads (script default filename).
  - name: min_length
    required: false
    default: 50
    description: seqkit seq -m minimum read length (verbatim).
  - name: out_dir
    required: true
    description: Output directory.
  - name: threads
    required: false
    default: 8
    description: Threads for minimap2/racon.
pre_hooks:
  - "preflight.check_dir_exists(input_dir)"
  - "preflight.check_file_exists(reference_fasta)"
  - "preflight.check_any_command_available(['dorado', 'guppy_basecaller'])"
  - "preflight.check_command_available('minimap2')"
  - "preflight.check_command_available('samtools')"
command_templates:
  - id: basecall_rna004
    description: Basecall direct RNA004 to FASTQ.
    template: |-
      dorado basecaller --emit-fastq {rna004_model} {input_dir} > {output_fastq}
    source: Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/base_calling_RNA004.sh
  - id: basecall_rna002_guppy
    description: Basecall legacy direct RNA002 with Guppy.
    template: |-
      guppy_basecaller -i {input_dir} -r -s {output_fastq} -c rna_r9.4.1_70bps_hac.cfg -x cuda:0
    source: Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/base_calling_RNA002.sh
  - id: basecall_cdna_guppy
    description: Basecall cDNA (rapid barcoding) with Guppy.
    template: |-
      guppy_basecaller -i {input_dir} -r -s {output_fastq} --detect_barcodes -c dna_r10.4.1_e8.2_400bps_hac.cfg -x cuda:0
    source: Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/base_calling_cDNA.sh
  - id: basecall_rna004_m6a
    description: Basecall RNA004 with m6A modification detection against a reference.
    template: |-
      dorado basecaller --modified-bases-models {rna004_mod_model} --reference {reference_fasta} {rna004_base_model} {input_dir} > {output_bam}
    source: Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/RNA_mod_base_calling_dRNA004.sh
  - id: length_filter
    description: Remove short reads before assembly/mapping.
    template: |-
      seqkit seq -m {min_length} {reads_fastq} > {filtered_fastq}
    source: Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/denovo_flye.sh
  - id: assembly_flye
    description: De novo assembly (standard).
    template: |-
      flye --nano-raw {filtered_fastq} --out-dir {out_dir}
    source: Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/denovo_flye.sh
  - id: assembly_meta_flye
    description: De novo assembly (metagenomic mode for complex samples).
    template: |-
      flye --meta --nano-raw {filtered_fastq} --out-dir {out_dir}
    source: Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/denovo_meta_flye.sh
  - id: polish_minimap2_racon
    description: Polish the assembly with Minimap2 + Racon.
    template: |-
      minimap2 -ax map-ont -t {threads} {out_dir}/assembly.fasta {filtered_fastq} > {out_dir}/aln_ass.sam && racon {filtered_fastq} {out_dir}/aln_ass.sam {out_dir}/assembly.fasta > {out_dir}/polished_consensus.fasta
    source: Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/denovo_flye.sh
  - id: ref_align_cdna
    description: Reference-based initial alignment for cDNA (map-ont).
    template: |-
      minimap2 -ax map-ont {reference_fasta} {filtered_fastq} > {out_dir}/aln.sam
    source: Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/flu_ref_based_new.sh
  - id: ref_align_rna
    description: Reference-based initial alignment for direct RNA (spliced preset).
    template: |-
      minimap2 -ax splice -uf -k7 {reference_fasta} {filtered_fastq} > {out_dir}/aln.sam
    source: Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/flu_ref_based_new_RNA.sh
  - id: consensus_bcftools
    description: Generate a consensus with BCFtools after best-reference selection.
    template: |-
      bcftools mpileup -Ou -f {reference_fasta} {out_dir}/sorted_best_reference.bam | bcftools call -Oz -mv -o {out_dir}/variants.vcf.gz && bcftools index {out_dir}/variants.vcf.gz && bcftools consensus -f {reference_fasta} {out_dir}/variants.vcf.gz > {out_dir}/consensus_bcftools.fasta
    source: Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/flu_ref_based_new.sh
  - id: consensus_ivar
    description: Generate an alternative consensus with iVar.
    template: |-
      samtools mpileup -aa -A -d 0 -Q 0 {out_dir}/sorted_best_reference.bam | ivar consensus -m 0 -q 0 -p {out_dir}/consensus_ivar.fasta
    source: Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/flu_ref_based_new.sh
  - id: consensus_irma
    description: Influenza-specific iterative consensus assembly (per FASTQ).
    template: |-
      IRMA FLU-minion {reads_fastq} {out_dir}
    source: Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/irma.sh
post_hooks:
  - "parsers.parse_generic_tsv(idxstats_txt)"
  - "parsers.parse_vcf(variants_vcf)"
validation_hooks:
  - "validation.unexpected_empty_output(path=consensus_fasta)"
  - "validation.low_read_yield(n_reads=n_reads)"
outputs:
  - name: polished_consensus.fasta
    type: fasta
    description: De novo polished assembly (Flye + Racon).
  - name: consensus_bcftools.fasta
    type: fasta
    description: Reference-based consensus via BCFtools (per FASTQ/segment).
  - name: consensus_ivar.fasta
    type: fasta
    description: Reference-based consensus via iVar.
  - name: IRMA output directory
    type: directory
    description: IRMA per-segment consensus and amended assemblies.
caveats:
  - LLM outputs are suggestions, not biological, clinical, regulatory, or diagnostic conclusions.
  - Scripts contain hardcoded paths and SLURM directives intended to be edited per run (run_pipeline.sh only routes the user to the correct script).
  - RNA002 and cDNA basecalling use Guppy (legacy/deprecated upstream); use only for matching legacy chemistry.
  - iVar, IRMA and BLAST+ are not in the unified environment.yaml and must be installed separately.
failure_modes:
  - symptom: No reads map to a segment / empty consensus.
    cause: Wrong reference, wrong chemistry preset (map-ont vs splice for RNA), or insufficient reads.
    mitigation: Verify the AIV segment reference and use the RNA spliced preset for direct-RNA data.
source_files:
  - Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/README.md
  - Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/run_pipeline.sh
  - Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/base_calling_RNA004.sh
  - Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/base_calling_RNA002.sh
  - Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/base_calling_cDNA.sh
  - Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/RNA_mod_base_calling_dRNA004.sh
  - Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/denovo_flye.sh
  - Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/denovo_meta_flye.sh
  - Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/flu_ref_based_new.sh
  - Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/flu_ref_based_new_RNA.sh
  - Veterinary_and_Zoonotic_Surveillance/Avian-Influenza-Profiling/irma.sh
  - MANUAL_EXECUTION_GUIDE.md
  - environment.yaml
external_references:
  - label: EPI2ME wf-flu
    url: https://github.com/epi2me-labs/wf-flu
    note: Upstream influenza A/B typing (IRMA consensus, INSaFLU typing). Comparison only.
  - label: ONT Dorado
    url: https://github.com/nanoporetech/dorado
    note: RNA004 and m6A modification model naming.
external_reference_notes: >-
  Upstream wf-flu (v1.4.0) builds an IRMA consensus, types with an INSaFLU BLAST
  database, and offers an --rbk flag for rapid-barcoding data; it uses Medaka for
  polishing. The local pipeline instead benchmarks several consensus methods
  (BCFtools, iVar, IRMA) across chemistries. Upstream parameters are not
  back-ported; local commands remain the source of truth.
needs_review:
  - "base_calling_RNA004.sh uses Dorado model rna004_130bps_hac@v3.0.1, while MANUAL_EXECUTION_GUIDE.md references rna004_130bps_sup@v3.0.1 for RNA004; reconcile hac vs sup."
  - "irma.sh runs `IRMA FLU-minion`, while MANUAL_EXECUTION_GUIDE.md shows `IRMA FLU`; confirm the intended IRMA module."
  - "ivar, IRMA, and blastn are referenced by scripts but absent from the unified environment.yaml; install separately."
