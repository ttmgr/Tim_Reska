name: air_metagenomics
display_name: Air Metagenomics
domain: Environmental Metagenomics
description: >-
  Shotgun metagenomics of low-biomass air/bioaerosol samples collected by liquid
  impingement. A modular four-stage bash workflow: (1) read processing (Porechop,
  NanoFilt, NanoStat, Kraken2 on reads); (2) metaFlye assembly + Minimap2/Racon
  polishing + assembly-stats; (3) MetaWRAP binning (MetaBAT2/MaxBin2/CONCOCT) and
  refinement into MAGs; (4) functional/AMR annotation (Kraken2 on contigs, Prokka,
  Bakta, Prodigal + eggNOG-mapper, ABRicate, AMRFinderPlus). Route here for air or
  bioaerosol DNA, not for water or soil matrices.
supported_input_types:
  - fast5
  - pod5
  - fastq
tools:
  - name: dorado
    version: "manual install"
    purpose: Basecalling POD5 (config model dna_r10.4.1_e8.2_400bps_hac@v4.3.0).
    url: https://github.com/nanoporetech/dorado
  - name: guppy_basecaller
    version: "ONT legacy (pilot FAST5)"
    purpose: Basecalling legacy FAST5.
    url: https://github.com/nanoporetech/dorado
  - name: porechop
    version: "0.2.4"
    purpose: Adapter trimming.
    url: https://github.com/rrwick/Porechop
  - name: NanoFilt
    version: "2.8.0"
    purpose: Quality and length filtering (-q 9 -l 500 in the stage script).
    url: https://github.com/wdecoster/nanofilt
  - name: NanoStat
    version: ">=1.6.0"
    purpose: Read QC metrics.
    url: https://github.com/wdecoster/NanoStat
  - name: kraken2
    version: ">=2.1.3"
    purpose: Taxonomic classification of reads and contigs.
    url: https://github.com/DerrickWood/kraken2
  - name: flye
    version: ">=2.9.4"
    purpose: Metagenomic assembly (--meta).
    url: https://github.com/mikolmogorov/Flye
  - name: minimap2
    version: ">=2.28"
    purpose: Polishing alignment.
    url: https://github.com/lh3/minimap2
  - name: racon
    version: ">=1.5.0"
    purpose: Assembly polishing.
    url: https://github.com/isovic/racon
  - name: assembly-stats
    version: "not in unified environment.yaml (install separately)"
    purpose: Assembly summary statistics.
    url: https://github.com/sanger-pathogens/assembly-stats
  - name: metawrap
    version: "separate env (MetaBAT2/MaxBin2/CONCOCT)"
    purpose: Metagenome binning and refinement.
    url: https://github.com/bxlab/metaWRAP
  - name: seqkit
    version: ">=2.8.0"
    purpose: FASTQ to FASTA.
    url: https://github.com/shenwei356/seqkit
  - name: abricate
    version: ">=1.0.1"
    purpose: AMR/virulence screening.
    url: https://github.com/tseemann/abricate
  - name: amrfinder
    version: "ncbi-amrfinderplus >=3.12"
    purpose: AMR gene detection.
    url: https://github.com/ncbi/amr
  - name: prokka
    version: "separate env"
    purpose: Prokaryotic annotation (legacy; Bakta preferred).
    url: https://github.com/tseemann/prokka
  - name: bakta
    version: ">=1.9.0"
    purpose: Rapid genome annotation.
    url: https://github.com/oschwengers/bakta
  - name: prodigal
    version: ">=2.6.3"
    purpose: Gene prediction (-p meta).
    url: https://github.com/hyattpd/Prodigal
  - name: eggnog-mapper
    version: "separate env"
    purpose: Functional annotation (emapper.py -m diamond).
    url: https://github.com/eggnogdb/eggnog-mapper
required_databases:
  - name: Kraken2 database
    note: Read- and contig-level classification.
  - name: AMRFinderPlus database
    note: AMR gene detection (-d path).
  - name: Bakta database
    note: Genome annotation (--db path).
  - name: eggNOG data
    note: Functional annotation (--data_dir path).
parameters:
  - name: input_fastq
    required: true
    description: A basecalled barcode FASTQ (e.g. barcodeNN.fastq).
  - name: trimmed_fastq
    required: true
    description: Porechop output.
  - name: filtered_fastq
    required: true
    description: NanoFilt output.
  - name: min_q
    required: false
    default: 9
    description: NanoFilt minimum quality (verbatim from 01_read_processing.sh).
  - name: min_len
    required: false
    default: 500
    description: NanoFilt minimum length (verbatim from 01_read_processing.sh).
  - name: nanostat_out
    required: true
    description: NanoStat output path.
  - name: kraken2_db
    required: true
    description: Kraken2 database path.
  - name: kraken_report
    required: true
    description: Kraken2 report path.
  - name: kraken_output
    required: true
    description: Kraken2 per-read output path.
  - name: flye_out_dir
    required: true
    description: Flye output directory.
  - name: assembly_fasta
    required: true
    description: Flye assembly.fasta.
  - name: sam_file
    required: true
    description: Minimap2 SAM for polishing.
  - name: polished_fasta
    required: true
    description: Racon-polished assembly.
  - name: binning_out_dir
    required: true
    description: MetaWRAP binning output directory.
  - name: amrfinder_db
    required: true
    description: AMRFinderPlus database path.
  - name: bakta_db
    required: true
    description: Bakta database path.
  - name: eggnog_data_dir
    required: true
    description: eggNOG data directory.
  - name: read_fasta
    required: true
    description: Reads converted to FASTA for read-level AMR.
  - name: proteins_faa
    required: true
    description: Prodigal protein predictions.
  - name: sample
    required: true
    description: Sample/base name for Prokka prefix and outputs.
  - name: threads
    required: false
    default: 20
    description: Worker threads.
pre_hooks:
  - "preflight.check_fastq_extension(input_fastq)"
  - "preflight.check_database_exists(kraken2_db)"
  - "preflight.check_database_exists(amrfinder_db)"
  - "preflight.check_command_available('flye')"
  - "preflight.check_command_available('kraken2')"
command_templates:
  - id: porechop
    description: Trim adapters.
    template: |-
      porechop -i {input_fastq} -o {trimmed_fastq} --threads {threads}
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/01_read_processing.sh
  - id: nanofilt
    description: Quality and length filter.
    template: |-
      cat {trimmed_fastq} | NanoFilt -q {min_q} -l {min_len} > {filtered_fastq}
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/01_read_processing.sh
  - id: nanostat
    description: Read QC metrics.
    template: |-
      NanoStat --fastq {filtered_fastq} > {nanostat_out}
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/01_read_processing.sh
  - id: kraken2_reads
    description: Classify reads taxonomically.
    template: |-
      kraken2 --db {kraken2_db} --threads {threads} --use-names --report {kraken_report} --output {kraken_output} {filtered_fastq}
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/01_read_processing.sh
  - id: assembly_flye
    description: Metagenomic assembly.
    template: |-
      flye --nano-hq {filtered_fastq} -o {flye_out_dir} --threads {threads} --meta
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/02_assembly_and_polishing.sh
  - id: polish_minimap2
    description: Align reads to the assembly for polishing.
    template: |-
      minimap2 -ax map-ont -t {threads} {assembly_fasta} {filtered_fastq} > {sam_file}
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/02_assembly_and_polishing.sh
  - id: polish_racon
    description: Polish the assembly with Racon (1 round).
    template: |-
      racon -t {threads} {filtered_fastq} {sam_file} {assembly_fasta} > {polished_fasta}
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/02_assembly_and_polishing.sh
  - id: assembly_stats
    description: Assembly summary statistics.
    template: |-
      assembly-stats {polished_fasta} > {flye_out_dir}/assemblystats.txt
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/02_assembly_and_polishing.sh
  - id: binning
    description: MetaWRAP binning across three binners.
    template: |-
      metawrap binning -o {binning_out_dir} -t {threads} -a {polished_fasta} --metabat2 --maxbin2 --concoct {filtered_fastq}
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/03_binning.sh
  - id: bin_refinement
    description: MetaWRAP bin refinement (>=50% completeness, <=10% contamination).
    template: |-
      metawrap bin_refinement -o {binning_out_dir}/BIN_REFINEMENT -t {threads} -A {binning_out_dir}/metabat2_bins/ -B {binning_out_dir}/maxbin2_bins/ -C {binning_out_dir}/concoct_bins/ -c 50 -x 10
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/03_binning.sh
  - id: reads_to_fasta
    description: Convert reads to FASTA for read-level AMR.
    template: |-
      seqkit fq2fa {filtered_fastq} -o {read_fasta}
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/04_annotation.sh
  - id: abricate_reads
    description: ABRicate AMR/virulence screen on reads.
    template: |-
      abricate --threads {threads} {read_fasta} > {flye_out_dir}/abricate_reads.txt
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/04_annotation.sh
  - id: amrfinder_reads
    description: AMRFinderPlus on reads.
    template: |-
      amrfinder --threads {threads} -n {read_fasta} -d {amrfinder_db} > {flye_out_dir}/amrfinder_reads.txt
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/04_annotation.sh
  - id: prokka
    description: Prokka annotation of the polished assembly.
    template: |-
      prokka --outdir {flye_out_dir}/prokka_{sample} --prefix {sample} --cpus {threads} {polished_fasta}
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/04_annotation.sh
  - id: bakta
    description: Bakta annotation of the polished assembly.
    template: |-
      bakta --db {bakta_db} --output {flye_out_dir}/bakta_{sample} {polished_fasta} --threads {threads}
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/04_annotation.sh
  - id: prodigal
    description: Predict genes for functional annotation.
    template: |-
      prodigal -i {polished_fasta} -a {proteins_faa} -p meta -q
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/04_annotation.sh
  - id: eggnog
    description: Functional annotation with eggNOG-mapper.
    template: |-
      emapper.py -i {proteins_faa} --output {flye_out_dir}/eggnog_{sample} -m diamond --cpu {threads} --data_dir {eggnog_data_dir} --override
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/04_annotation.sh
  - id: amrfinder_contigs
    description: AMRFinderPlus on the polished contigs.
    template: |-
      amrfinder --threads {threads} -n {polished_fasta} -d {amrfinder_db} > {flye_out_dir}/amrfinder_contigs.txt
    source: Environmental_Metagenomics/Air_Metagenomics/bash_scripts/04_annotation.sh
post_hooks:
  - "parsers.parse_nanostat(nanostat_out)"
  - "parsers.parse_kraken2_report(kraken_report)"
  - "parsers.parse_amrfinder_table(amrfinder_contigs_txt)"
validation_hooks:
  - "validation.low_read_yield(n_reads=n_reads, total_bases=total_bases)"
  - "validation.low_n50(n50)"
  - "validation.low_classification_rate(classified_percent)"
outputs:
  - name: nanostats.txt
    type: txt
    description: Per-sample read QC.
  - name: kraken report
    type: txt
    description: Read- and contig-level taxonomic profiles.
  - name: polished assembly + assemblystats
    type: fasta/txt
    description: Flye+Racon assembly and summary statistics.
  - name: MetaWRAP bins
    type: directory
    description: Refined MAGs (>=50% completeness, <=10% contamination).
  - name: Prokka/Bakta/eggNOG/AMR outputs
    type: mixed
    description: Functional and AMR annotation of reads and contigs.
caveats:
  - LLM outputs are suggestions, not biological, clinical, regulatory, or diagnostic conclusions.
  - Optimized for ultra-low biomass air samples; not a dedicated soil or water workflow.
  - config/config.yaml is a template ("Copy this file ... and adjust"); the bash stage scripts hardcode their own parameters, which take precedence.
  - assembly-stats, MetaWRAP (MetaBAT2/MaxBin2/CONCOCT), Prokka and eggNOG-mapper live in separate environments, not the unified environment.yaml.
failure_modes:
  - symptom: No FASTQ files matched.
    cause: Stage 1 expects barcode*.fastq in the input directory.
    mitigation: Name inputs barcodeNN.fastq or adjust the loop glob.
  - symptom: MetaWRAP refinement empty.
    cause: Insufficient contig length/coverage for binning at low biomass.
    mitigation: Review assembly size; binning may not be feasible for very low-yield samples.
source_files:
  - Environmental_Metagenomics/Air_Metagenomics/README.md
  - Environmental_Metagenomics/Air_Metagenomics/bash_scripts/01_read_processing.sh
  - Environmental_Metagenomics/Air_Metagenomics/bash_scripts/02_assembly_and_polishing.sh
  - Environmental_Metagenomics/Air_Metagenomics/bash_scripts/03_binning.sh
  - Environmental_Metagenomics/Air_Metagenomics/bash_scripts/04_annotation.sh
  - Environmental_Metagenomics/Air_Metagenomics/bash_scripts/run_pipeline.sh
  - Environmental_Metagenomics/Air_Metagenomics/config/config.yaml
  - Environmental_Metagenomics/Air_Metagenomics/binning.md
  - Environmental_Metagenomics/Air_Metagenomics/duplex_basecalling/dorado_duplex.sh
  - MANUAL_EXECUTION_GUIDE.md
  - environment.yaml
external_references:
  - label: EPI2ME wf-metagenomics
    url: https://github.com/epi2me-labs/wf-metagenomics
    note: Upstream Kraken2/Minimap2 metagenomic classification + AMR scanning. Comparison only.
  - label: EPI2ME wf-basecalling
    url: https://github.com/epi2me-labs/wf-basecalling
    note: Upstream Dorado basecalling helper. Comparison only.
external_reference_notes: >-
  Upstream wf-metagenomics performs classification and optional AMR scanning but
  does not assemble, bin, or run multi-tool functional annotation; the local
  workflow does (Flye + MetaWRAP + Prokka/Bakta/eggNOG). Upstream defaults are not
  back-ported. Local stage scripts remain source of truth.
needs_review:
  - "Basecalling model differs across sources: config/config.yaml uses dna_r10.4.1_e8.2_400bps_hac@v4.3.0 and pipelines.json says Dorado HAC v4.3.0, while MANUAL_EXECUTION_GUIDE.md shows dna_r10.4.1_e8.2_400bps_hac@v5.0.0; confirm the intended model version."
  - "NanoFilt thresholds differ: 01_read_processing.sh uses -q 9 -l 500, config.yaml lists min_quality 9 / min_length 100, and playbooks.json says Q>=8 / 100 bp; the stage script (-q 9 -l 500) is used here as source of truth."
