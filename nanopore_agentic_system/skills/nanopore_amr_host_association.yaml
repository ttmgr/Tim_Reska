name: nanopore_amr_host_association
display_name: Nanopore AMR Host Association
domain: Clinical Isolates & Plasmid Profiling
description: >-
  Methylation-aware clinical metagenomics that links AMR-carrying plasmids and
  chromosomes to their bacterial hosts. From raw POD5, the workflow basecalls
  with methylation models, demultiplexes, filters reads, assembles, polishes,
  builds a modification pileup, discovers methylation motifs (Nanomotif), types
  plasmids (MOB-suite), detects AMR genes (AMRFinderPlus), annotates taxonomy
  (Kraken2, used only for annotation), and infers host association from shared
  methylation motif vectors. Route here for clinical metagenomes where resistance
  genes must be tied back to a host, not for purified isolates.
supported_input_types:
  - pod5
tools:
  - name: dorado
    version: "manual install (see INSTALL_AND_DATABASES.md); upstream latest v2.0.0"
    purpose: Basecalling with methylation models, demux, aligner, polish.
    url: https://github.com/nanoporetech/dorado
  - name: samtools
    version: ">=1.19"
    purpose: BAM/FASTQ conversion, sort, index.
    url: https://github.com/samtools/samtools
  - name: chopper
    version: ">=0.7.0"
    purpose: Read quality and length filtering.
    url: https://github.com/wdecoster/chopper
  - name: metaMDBG
    version: ">=1.1.0 (manual build)"
    purpose: Metagenomic assembly (option A).
    url: https://github.com/GaetanBenoitDev/metaMDBG
  - name: flye
    version: ">=2.9.4"
    purpose: Metagenomic assembly (option B, --meta).
    url: https://github.com/mikolmogorov/Flye
  - name: modkit
    version: "ont-modkit (separate env); upstream latest v0.6.2"
    purpose: Modified-base pileup from aligned BAM.
    url: https://github.com/nanoporetech/modkit
  - name: nanomotif
    version: ">=0.6.4 (pip)"
    purpose: Methylation motif discovery and motif-contig scoring.
    url: https://github.com/MicrobialDarkMatter/nanomotif
  - name: mob_recon
    version: "mob-suite >=3.1.4"
    purpose: Plasmid vs chromosome identification (contig_report.txt).
    url: https://github.com/phac-nml/mob-suite
  - name: amrfinder
    version: "ncbi-amrfinderplus >=3.12"
    purpose: AMR gene detection (nucleotide).
    url: https://github.com/ncbi/amr
  - name: kraken2
    version: ">=2.1.3"
    purpose: Contig taxonomic annotation only (not used for host inference).
    url: https://github.com/DerrickWood/kraken2
required_databases:
  - name: Kraken2 database
    note: Required for contig taxonomic annotation. See INSTALL_AND_DATABASES.md.
  - name: AMRFinderPlus database
    note: Installed/updated via `amrfinder --update`. See INSTALL_AND_DATABASES.md.
parameters:
  - name: pod5_dir
    required: true
    description: Directory of raw POD5 signal files.
  - name: models_dir
    required: true
    description: Dorado models directory (--models-directory).
  - name: basecalled_bam
    required: true
    description: Output basecalled BAM path.
  - name: kit
    required: false
    default: SQK-RBK114-24
    description: Sequencing kit name for basecalling/demux.
  - name: model
    required: false
    default: sup,6mA,4mC_5mC
    description: Dorado model string with methylation models, verbatim from basecall_dorado_sup.sh.
  - name: demux_dir
    required: true
    description: Output directory for per-barcode BAMs.
  - name: input_bam
    required: true
    description: Per-barcode BAM to convert to FASTQ.
  - name: reads_fastq
    required: true
    description: FASTQ produced from the BAM.
  - name: filtered_fastq
    required: true
    description: Chopper-filtered FASTQ.
  - name: min_q
    required: false
    default: 9
    description: Chopper minimum quality (verbatim from chopper_filter.sh).
  - name: min_len
    required: false
    default: 200
    description: Chopper minimum read length (verbatim from chopper_filter.sh).
  - name: assembly_fasta
    required: true
    description: Assembled contigs FASTA.
  - name: assembly_out_dir
    required: true
    description: Assembler output directory.
  - name: reads_bam
    required: true
    description: Filtered BAM kept in sync with filtered FASTQ for methylation-aware steps.
  - name: aln_bam
    required: true
    description: Sorted aligned BAM.
  - name: polished_fasta
    required: true
    description: Dorado-polished assembly FASTA.
  - name: pileup_bed
    required: true
    description: Modkit pileup BED output.
  - name: contig_bin_tsv
    required: true
    description: Contig-to-bin TSV (each contig its own bin).
  - name: nanomotif_out_dir
    required: true
    description: Nanomotif output directory.
  - name: bin_motifs_tsv
    required: true
    description: bin-motifs.tsv produced by motif_discovery.
  - name: mobsuite_out_dir
    required: true
    description: MOB-suite output directory.
  - name: amrfinder_out
    required: true
    description: AMRFinder output table path.
  - name: kraken2_db
    required: true
    description: Path to the Kraken2 database.
  - name: kraken2_out_dir
    required: true
    description: Output directory for kraken2.out and kraken2.report.
  - name: final_out_dir
    required: true
    description: Output directory for AMR host association tables.
  - name: threads
    required: false
    default: 20
    description: Worker threads (scripts use 20 for most steps, 12 for kraken2).
  - name: valid_coverage
    required: false
    default: 10
    description: Nanomotif --threshold_valid_coverage (verbatim from nanomotif.sh).
pre_hooks:
  - "preflight.check_dir_exists(pod5_dir)"
  - "preflight.check_dir_exists(models_dir)"
  - "preflight.check_database_exists(kraken2_db)"
  - "preflight.check_command_available('dorado')"
  - "preflight.check_any_command_available(['metaMDBG', 'flye'])"
  - "preflight.check_command_available('modkit')"
  - "preflight.check_command_available('nanomotif')"
  - "preflight.check_command_available('mob_recon')"
  - "preflight.check_command_available('amrfinder')"
command_templates:
  - id: basecall
    description: Basecall POD5 to a methylation-aware BAM (GPU recommended).
    template: |-
      dorado basecaller {model} -r {pod5_dir} --models-directory {models_dir} --kit-name {kit} --verbose --trim all --emit-moves > {basecalled_bam}
    source: Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/basecall_dorado_sup.sh
  - id: demux
    description: Demultiplex the basecalled BAM into per-barcode BAMs.
    template: |-
      dorado demux --output-dir {demux_dir} --no-classify {basecalled_bam}
    source: Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/demux.sh
  - id: bam2fastq
    description: Convert a per-barcode BAM to FASTQ.
    template: |-
      samtools fastq -@ {threads} {input_bam} > {reads_fastq}
    source: Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/bam2fastq.sh
  - id: chopper_filter
    description: Filter reads by quality and length.
    template: |-
      chopper -q {min_q} -l {min_len} -i {reads_fastq} > {filtered_fastq}
    source: Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/chopper_filter.sh
  - id: filter_bam_by_fastq
    description: Keep only BAM reads present in the filtered FASTQ (BAM/FASTQ sync). Script paths are edited in-file (no CLI args).
    template: |-
      python filter_bam_by_fastq.py
    source: Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/filter_bam_by_fastq.py
    needs_review: true
  - id: assembly_metamdbg
    description: Assembly option A (metaMDBG).
    template: |-
      metaMDBG asm --out-dir {assembly_out_dir} --in-ont {filtered_fastq} --threads {threads}
    source: Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/nanomdbg_assembly.sh
  - id: assembly_metaflye
    description: Assembly option B (metaFlye).
    template: |-
      flye --nano-hq {filtered_fastq} -o {assembly_out_dir} --threads {threads} --meta
    source: Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/metaflye_assembly.sh
  - id: align_to_assembly
    description: Align filtered reads (BAM) to the assembly, sort and index.
    template: |-
      dorado aligner {assembly_fasta} {reads_bam} | samtools sort -@ {threads} -o {aln_bam} && samtools index -@ {threads} {aln_bam}
    source: Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/dorado_align.sh
  - id: polish
    description: Polish the assembly with Dorado (bacterial model).
    template: |-
      dorado polish {aln_bam} {assembly_fasta} --ignore-read-groups --bacteria > {polished_fasta}
    source: Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/dorado_polish.sh
  - id: modkit_pileup
    description: Build a modification pileup BED from reads aligned to the polished assembly.
    template: |-
      modkit pileup --ref {polished_fasta} --threads {threads} {aln_bam} {pileup_bed}
    source: Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/modkit_pileup.sh
  - id: make_contig_bins
    description: Create a contig-to-bin TSV (each contig its own bin). Script paths are edited in-file (no CLI args).
    template: |-
      python make_contig_bins.py
    source: Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/make_contig_bins.py
    needs_review: true
  - id: nanomotif_motif_discovery
    description: Discover methylation motifs per contig.
    template: |-
      nanomotif motif_discovery {polished_fasta} {pileup_bed} -c {contig_bin_tsv} --out {nanomotif_out_dir} -t {threads} --threshold_valid_coverage {valid_coverage}
    source: Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/nanomotif.sh
  - id: nanomotif_detect_contamination
    description: Produce the motif-contig score file used downstream for host association.
    template: |-
      nanomotif detect_contamination --pileup {pileup_bed} --assembly {polished_fasta} --bin_motifs {bin_motifs_tsv} --contig_bins {contig_bin_tsv} --out {nanomotif_out_dir}
    source: Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/nanomotif.sh
  - id: mob_recon
    description: Identify plasmid vs chromosome contigs.
    template: |-
      mob_recon --infile {polished_fasta} --outdir {mobsuite_out_dir} --force
    source: Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/mobsuite.sh
  - id: amrfinder
    description: Detect AMR genes on the assembly.
    template: |-
      amrfinder --nucleotide {polished_fasta} > {amrfinder_out}
    source: Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/amrfinder.sh
  - id: kraken2_contigs
    description: Annotate contigs taxonomically (annotation only).
    template: |-
      kraken2 --db {kraken2_db} --threads {threads} --report {kraken2_out_dir}/kraken2.report --output {kraken2_out_dir}/kraken2.out --use-names {polished_fasta}
    source: Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/kraken2.sh
  - id: amr_host_association
    description: Infer AMR plasmid/chromosome host association from methylation motif vectors.
    template: |-
      python amr_host_association.py --nanomotif-dir {nanomotif_out_dir} --mobsuite-dir {mobsuite_out_dir} --amr-dir {amrfinder_out} --kraken-dir {kraken2_out_dir} --outdir {final_out_dir}
    source: Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/amr_host_association.py
post_hooks:
  - "parsers.parse_kraken2_report(kraken2_report)"
  - "parsers.parse_amrfinder_table(amrfinder_out)"
  - "parsers.parse_generic_tsv(final_out_dir + '/AMR_plasmid_assignment.tsv')"
  - "parsers.parse_generic_tsv(final_out_dir + '/AMR_chromosome_assignment.tsv')"
validation_hooks:
  - "validation.missing_amr_hits(n_hits)"
  - "validation.contamination_signal(n_flagged=...)"
  - "validation.unexpected_empty_output(path=polished_fasta)"
  - "validation.database_not_detected(path=kraken2_db)"
outputs:
  - name: AMR_plasmid_assignment.tsv
    type: tsv
    description: One row per AMR-carrying plasmid with inferred host via plasmid->chromosome Nanomotif RMSD.
  - name: AMR_chromosome_assignment.tsv
    type: tsv
    description: One row per AMR-carrying chromosome, Kraken2 species annotation with Nanomotif fallback.
  - name: motifs-scored-read-methylation.tsv
    type: tsv
    description: Nanomotif per-(contig,motif) methylation scores driving host association.
  - name: contig_report.txt
    type: txt
    description: MOB-suite plasmid/chromosome molecule typing.
caveats:
  - LLM outputs are suggestions, not biological, clinical, regulatory, or diagnostic conclusions.
  - Kraken2 is used for annotation only; host association depends on methylation-aware Nanomotif analysis.
  - Requires raw POD5 entry and methylation-aware downstream analysis; not for purified isolates or generic plasmid clustering.
  - Filtered BAM and FASTQ must stay synchronized (filter_bam_by_fastq) for methylation steps to be valid.
failure_modes:
  - symptom: amr_host_association.py stops with "Could not find ... in <folder>".
    cause: Expected input file (motifs-scored-read-methylation.tsv, contig_report.txt, kraken .out/.report, AMRFinder .tsv/.txt) missing in the supplied directory.
    mitigation: Confirm each upstream step completed and points to the right directory.
  - symptom: Empty or tiny assembly.
    cause: Low yield or over-aggressive read filtering.
    mitigation: Re-check chopper -q/-l and basecalling output before assembly.
source_files:
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/README.md
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/run_pipeline.sh
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/basecall_dorado_sup.sh
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/demux.sh
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/bam2fastq.sh
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/chopper_filter.sh
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/filter_bam_by_fastq.py
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/nanomdbg_assembly.sh
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/metaflye_assembly.sh
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/dorado_align.sh
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/dorado_polish.sh
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/modkit_pileup.sh
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/make_contig_bins.py
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/nanomotif.sh
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/mobsuite.sh
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/amrfinder.sh
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/kraken2.sh
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/amr_host_association.py
  - Clinical_Isolates_and_Plasmid_Profiling/Nanopore-AMR-Host-Association/docs/amr_host_association_outputs.md
  - MANUAL_EXECUTION_GUIDE.md
  - environment.yaml
external_references:
  - label: EPI2ME wf-metagenomics
    url: https://github.com/epi2me-labs/wf-metagenomics
    note: Closest upstream for long-read metagenomic taxonomic classification + optional AMR scanning.
  - label: ONT Dorado
    url: https://github.com/nanoporetech/dorado
    note: Basecalling, aligner and polish; methylation model naming.
  - label: ONT Modkit
    url: https://github.com/nanoporetech/modkit
    note: Modified-base pileup reference.
external_reference_notes: >-
  No upstream EPI2ME workflow performs methylation-motif-based AMR host
  association; this is a repository-specific method and remains the source of
  truth. wf-metagenomics is referenced only for comparison of the
  classification/AMR-scanning steps. Upstream Dorado documents `dorado polish`
  with the draft and aligned BAM ordering; the repository's dorado_polish.sh
  passes the aligned BAM first then the reference - kept as documented locally.
needs_review:
  - "filter_bam_by_fastq.py and make_contig_bins.py have in-script hardcoded paths (no CLI arguments); an agent must edit the scripts before running."
  - "docs/amr_host_association_outputs.md describes columns (amr_gene_symbols_unique, species_association_method, nanomotif_taxonomic_association_profile, kraken_taxon) that differ from the columns amr_host_association.py actually writes (contig_id, molecule_type, amr_genes, has_nanomotif_vector, kraken_raw, assignment_method, best_species, best_candidate, best_final_score, top_score_species_counts); reconcile before relying on output schema."
