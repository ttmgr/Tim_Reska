name: wetland_dna_shotgun_metagenomics
display_name: Wetland Health - DNA Shotgun Metagenomics (Track 1)
domain: Environmental Metagenomics
description: >-
  DNA shotgun metagenomics branch of the Wetland Health study (passive water
  sampling). Basecall (Dorado SUP with methylation), demultiplex, BAM->FASTQ,
  Porechop, NanoFilt (>=100 bp), classify reads with Kraken2 against NCBI nt_core
  (rarefy to 87,000 reads with Seqkit for community/beta-diversity; full dataset
  for hazard detection), assemble with nanoMDBG, classify reads/contigs by
  Minimap2 + MEGAN-CE (LCA), detect AMR with AMRFinderPlus (+Prodigal), screen
  plasmids with PlasmidFinder, and screen virulence with DIAMOND vs VFDB. Route
  here for microbial community + pathogen + AMR profiling from wetland water DNA.
supported_input_types:
  - fastq
tools:
  - name: dorado
    version: "v5.0.0 (manual install)"
    purpose: Basecalling and demultiplexing.
    url: https://github.com/nanoporetech/dorado
  - name: samtools
    version: ">=1.19"
    purpose: BAM to FASTQ.
    url: https://github.com/samtools/samtools
  - name: porechop
    version: "0.2.4"
    purpose: Adapter trimming.
    url: https://github.com/rrwick/Porechop
  - name: NanoFilt
    version: "2.8.0"
    purpose: Length filtering (>=100 bp).
    url: https://github.com/wdecoster/nanofilt
  - name: seqkit
    version: "2.3.0"
    purpose: Rarefaction to 87,000 reads for community analysis.
    url: https://github.com/shenwei356/seqkit
  - name: kraken2
    version: "2.1.2"
    purpose: Read classification against NCBI nt_core.
    url: https://github.com/DerrickWood/kraken2
  - name: metaMDBG
    version: "1.1 (manual build)"
    purpose: Metagenomic assembly (chosen over metaFlye to avoid min-read-length data loss).
    url: https://github.com/GaetanBenoitDev/metaMDBG
  - name: minimap2
    version: "2.24/2.28"
    purpose: Alignment to NCBI nt_core for MEGAN classification.
    url: https://github.com/lh3/minimap2
  - name: megan
    version: "MEGAN-CE 6.21.1"
    purpose: LCA taxonomic classification of reads/contigs.
    url: https://github.com/husonlab/megan-ce
  - name: amrfinder
    version: "ncbi-amrfinderplus 4.0.23"
    purpose: AMR detection on reads and contigs (--plus).
    url: https://github.com/ncbi/amr
  - name: prodigal
    version: "2.6.3"
    purpose: ORF prediction for AMRFinderPlus.
    url: https://github.com/hyattpd/Prodigal
  - name: plasmidfinder
    version: "2.1.6"
    purpose: Plasmid detection on contigs.
    url: https://cge.food.dtu.dk/services/PlasmidFinder/
  - name: diamond
    version: "2.1.13"
    purpose: Translated alignment vs VFDB for virulence factors.
    url: https://github.com/bbuchfink/diamond
required_databases:
  - name: Kraken2 NCBI nt_core
    note: Read-level taxonomic classification.
  - name: NCBI nt (Minimap2 .mmi)
    note: Reference for MEGAN-CE LCA (align_megan.sh uses an .mmi index).
  - name: AMRFinderPlus database
    note: AMR detection.
  - name: VFDB (DIAMOND)
    note: Virulence factor screening.
parameters:
  - name: pod5_dir
    required: true
    description: Raw POD5 (basecalling entry); the published group repo often starts from basecalled FASTQ.
  - name: models_dir
    required: true
    description: Dorado models directory.
  - name: basecalled_bam
    required: true
    description: Basecalled BAM output.
  - name: kit
    required: false
    default: SQK-RBK114-24
    description: Sequencing kit.
  - name: model
    required: false
    default: sup,6mA,4mC_5mC
    description: Dorado model string (verbatim from MANUAL_EXECUTION_GUIDE.md).
  - name: demux_dir
    required: true
    description: Per-barcode BAM directory.
  - name: input_bam
    required: true
    description: Per-barcode BAM.
  - name: reads_fastq
    required: true
    description: FASTQ from BAM.
  - name: trimmed_fastq
    required: true
    description: Porechop output.
  - name: filtered_fastq
    required: true
    description: NanoFilt output.
  - name: min_q
    required: false
    default: 9
    description: NanoFilt minimum quality (MANUAL_EXECUTION_GUIDE.md).
  - name: min_len
    required: false
    default: 100
    description: NanoFilt minimum length.
  - name: kraken2_db
    required: true
    description: Kraken2 nt_core database path.
  - name: kraken_report
    required: true
    description: Kraken2 report path.
  - name: kraken_output
    required: true
    description: Kraken2 per-read output path.
  - name: assembly_out_dir
    required: true
    description: nanoMDBG output directory.
  - name: threads
    required: false
    default: 20
    description: Worker threads.
pre_hooks:
  - "preflight.check_database_exists(kraken2_db)"
  - "preflight.check_command_available('kraken2')"
  - "preflight.check_command_available('metaMDBG')"
  - "preflight.check_command_available('amrfinder')"
command_templates:
  - id: basecall
    description: Basecall POD5 with methylation models.
    template: |-
      dorado basecaller {model} {pod5_dir} --models-directory {models_dir} --kit-name {kit} --verbose --trim all --emit-moves > {basecalled_bam}
    source: MANUAL_EXECUTION_GUIDE.md
  - id: demux
    description: Demultiplex the basecalled BAM.
    template: |-
      dorado demux --output-dir {demux_dir} {basecalled_bam}
    source: MANUAL_EXECUTION_GUIDE.md
  - id: bam2fastq
    description: Convert a per-barcode BAM to FASTQ.
    template: |-
      samtools fastq -@ {threads} {input_bam} > {reads_fastq}
    source: MANUAL_EXECUTION_GUIDE.md
  - id: porechop
    description: Trim adapters.
    template: |-
      porechop -i {reads_fastq} -o {trimmed_fastq} --threads {threads}
    source: MANUAL_EXECUTION_GUIDE.md
  - id: nanofilt
    description: Quality and length filter.
    template: |-
      cat {trimmed_fastq} | NanoFilt -q {min_q} -l {min_len} > {filtered_fastq}
    source: MANUAL_EXECUTION_GUIDE.md
  - id: kraken2_reads
    description: Classify reads against NCBI nt_core.
    template: |-
      kraken2 --db {kraken2_db} --threads {threads} --use-names --report {kraken_report} --output {kraken_output} {filtered_fastq}
    source: MANUAL_EXECUTION_GUIDE.md
  - id: assembly_nanomdbg
    description: Metagenomic assembly with nanoMDBG.
    template: |-
      metaMDBG asm --out-dir {assembly_out_dir} --in-ont {filtered_fastq} --threads {threads}
    source: MANUAL_EXECUTION_GUIDE.md
  - id: amrfinder
    description: AMR + plasmid detection on the assembly.
    template: |-
      amrfinder --plus -n {assembly_out_dir}/assembly.fasta --threads {threads}
    source: MANUAL_EXECUTION_GUIDE.md
  - id: align_megan
    description: Align reads to NCBI nt (.mmi) for MEGAN-CE LCA classification (edit INPUT_TYPE then run the helper).
    template: |-
      bash align_megan.sh
    source: Environmental_Metagenomics/Wetland_Health/align_megan.sh
    needs_review: true
  - id: megan_process
    description: Convert SAM to RMA and export r2c/c2c profiles via MEGAN (edit INPUT_TYPE then run).
    template: |-
      bash submit_megan_processing_from_existing.sh
    source: Environmental_Metagenomics/Wetland_Health/submit_megan_processing_from_existing.sh
    needs_review: true
post_hooks:
  - "parsers.parse_kraken2_report(kraken_report)"
  - "parsers.parse_amrfinder_table(amrfinder_out)"
validation_hooks:
  - "validation.low_read_yield(n_reads=n_reads)"
  - "validation.low_classification_rate(classified_percent)"
  - "validation.missing_amr_hits(n_hits)"
outputs:
  - name: kraken report
    type: txt
    description: Read-level community profile (NCBI nt_core).
  - name: assembly.fasta
    type: fasta
    description: nanoMDBG metagenomic assembly.
  - name: MEGAN RMA + profiles
    type: mixed
    description: LCA taxonomic classification of reads/contigs.
  - name: amr_results.tsv
    type: tsv
    description: AMRFinderPlus AMR/virulence calls.
caveats:
  - LLM outputs are suggestions, not biological, clinical, regulatory, or diagnostic conclusions.
  - Wetland Health is an umbrella study; this is the DNA shotgun branch. Pick the matching branch for RNA virome, AIV, or 12S work.
  - Community (beta-diversity) analyses rarefy to 87,000 reads with Seqkit; hazard detection uses the full, non-rarefied dataset.
  - align_megan.sh and submit_megan_processing_from_existing.sh are configured by editing in-script variables (e.g. INPUT_TYPE="reads"/"contigs") before running.
failure_modes:
  - symptom: metaMDBG chosen over metaFlye.
    cause: metaFlye's minimum read length would discard >50% of wetland reads.
    mitigation: Use nanoMDBG as documented for this branch.
source_files:
  - Environmental_Metagenomics/Wetland_Health/README.md
  - Environmental_Metagenomics/Wetland_Health/dna_shotgun_analysis_pipeline.md
  - Environmental_Metagenomics/Wetland_Health/align_megan.sh
  - Environmental_Metagenomics/Wetland_Health/run_megan_post_alignment_from_existing.sh
  - Environmental_Metagenomics/Wetland_Health/submit_megan_processing_from_existing.sh
  - Environmental_Metagenomics/Wetland_Health/Binning.md
  - Environmental_Metagenomics/Wetland_Health/run_pipeline.sh
  - MANUAL_EXECUTION_GUIDE.md
  - environment.yaml
external_references:
  - label: EPI2ME wf-metagenomics
    url: https://github.com/epi2me-labs/wf-metagenomics
    note: Upstream Kraken2/Minimap2 classification + AMR scanning. Comparison only.
external_reference_notes: >-
  The local branch uses MEGAN-CE LCA over Minimap2 alignments to NCBI nt and
  nanoMDBG assembly; upstream wf-metagenomics uses Kraken2/Bracken or its own
  minimap2 path and does not run MEGAN or nanoMDBG. Upstream is referenced for
  comparison only; local commands remain source of truth.
needs_review:
  - "dna_shotgun_analysis_pipeline.md exceeds the single-read size limit and was not fully read inline; commands here come from MANUAL_EXECUTION_GUIDE.md, the Wetland README, and align_megan.sh. Re-read the full track doc to extract any additional verbatim commands and exact MEGAN invocations."
  - "MEGAN steps are run via helper scripts whose behavior depends on in-script INPUT_TYPE and path variables; not parameterized here."
