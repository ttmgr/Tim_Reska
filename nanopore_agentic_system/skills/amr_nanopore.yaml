name: amr_nanopore
display_name: AMR Nanopore (clinical isolate assembly)
domain: Clinical Isolates & Plasmid Profiling
description: >-
  Clinical isolate assembly and AMR profiling, documented around a multi-drug
  resistant Klebsiella pneumoniae KPC treatment study. From FAST5/FASTQ the
  workflow basecalls (Guppy, R9.4.1 legacy chemistry), trims and filters reads,
  assembles with Flye, and polishes with Minimap2 + Racon. Route here for a
  single purified isolate, not for metagenomes or methylation-based host linkage.
supported_input_types:
  - fast5
  - fastq
tools:
  - name: guppy_basecaller
    version: "ONT legacy basecaller (login required); deprecated upstream, replaced by Dorado"
    purpose: Basecalling from FAST5 with dna_r9.4.1_450bps_hac.
    url: https://github.com/nanoporetech/dorado
  - name: porechop
    version: "0.2.4"
    purpose: Adapter trimming.
    url: https://github.com/rrwick/Porechop
  - name: NanoFilt
    version: "2.8.0"
    purpose: Quality and length filtering.
    url: https://github.com/wdecoster/nanofilt
  - name: flye
    version: ">=2.9.4"
    purpose: De novo isolate assembly.
    url: https://github.com/mikolmogorov/Flye
  - name: minimap2
    version: ">=2.28"
    purpose: Read-to-assembly alignment for polishing.
    url: https://github.com/lh3/minimap2
  - name: samtools
    version: ">=1.19"
    purpose: BAM sort/index.
    url: https://github.com/samtools/samtools
  - name: racon
    version: ">=1.5.0"
    purpose: Consensus polishing.
    url: https://github.com/isovic/racon
required_databases: []
parameters:
  - name: input_dir
    required: true
    description: Raw FAST5 input directory (basecalling entry).
  - name: basecall_out_dir
    required: true
    description: Guppy output directory.
  - name: config
    required: false
    default: dna_r9.4.1_450bps_hac.cfg
    description: Guppy config (R9.4.1 legacy chemistry), verbatim from run_pipeline.sh / README.
  - name: fastq_in
    required: true
    description: Basecalled FASTQ (entry point if starting from FASTQ).
  - name: trimmed_fastq
    required: true
    description: Porechop-trimmed FASTQ.
  - name: filtered_fastq
    required: true
    description: NanoFilt-filtered FASTQ.
  - name: min_q
    required: false
    default: 9
    description: NanoFilt minimum quality (verbatim from run_pipeline.sh).
  - name: min_len
    required: false
    default: 200
    description: NanoFilt minimum length (verbatim from run_pipeline.sh).
  - name: flye_out_dir
    required: true
    description: Flye output directory.
  - name: assembly_fasta
    required: true
    description: Flye assembly.fasta.
  - name: aln_bam
    required: true
    description: Sorted alignment BAM.
  - name: polished_fasta
    required: true
    description: Racon-polished assembly.
pre_hooks:
  - "preflight.check_dir_exists(input_dir)"
  - "preflight.check_any_command_available(['guppy_basecaller', 'dorado'])"
  - "preflight.check_command_available('flye')"
  - "preflight.check_command_available('racon')"
command_templates:
  - id: basecall_guppy
    description: Basecall FAST5 with Guppy HAC (R9.4.1 legacy chemistry).
    template: |-
      guppy_basecaller -i {input_dir} -s {basecall_out_dir} --config {config}
    source: Clinical_Isolates_and_Plasmid_Profiling/AMR_nanopore/run_pipeline.sh
  - id: porechop
    description: Trim adapters.
    template: |-
      porechop -i {fastq_in} -o {trimmed_fastq}
    source: Clinical_Isolates_and_Plasmid_Profiling/AMR_nanopore/run_pipeline.sh
  - id: nanofilt
    description: Quality and length filter.
    template: |-
      cat {trimmed_fastq} | NanoFilt -q {min_q} -l {min_len} > {filtered_fastq}
    source: Clinical_Isolates_and_Plasmid_Profiling/AMR_nanopore/run_pipeline.sh
  - id: assembly_flye
    description: De novo isolate assembly (wrapper uses --nano-hq; README example shows --nano-corr; see needs_review).
    template: |-
      flye --nano-hq {filtered_fastq} --out-dir {flye_out_dir}
    source: Clinical_Isolates_and_Plasmid_Profiling/AMR_nanopore/run_pipeline.sh
  - id: align_for_polish
    description: Align reads to the assembly and sort.
    template: |-
      minimap2 -ax map-ont {assembly_fasta} {filtered_fastq} | samtools sort -o {aln_bam}
    source: Clinical_Isolates_and_Plasmid_Profiling/AMR_nanopore/run_pipeline.sh
  - id: polish_racon
    description: Polish the assembly with Racon.
    template: |-
      racon {filtered_fastq} {aln_bam} {assembly_fasta} > {polished_fasta}
    source: Clinical_Isolates_and_Plasmid_Profiling/AMR_nanopore/run_pipeline.sh
post_hooks:
  - "parsers.parse_generic_tsv(assembly_stats_tsv)"
validation_hooks:
  - "validation.unexpected_empty_output(path=assembly_fasta)"
  - "validation.low_n50(n50)"
outputs:
  - name: assembly.fasta
    type: fasta
    description: Flye de novo isolate assembly.
  - name: assembly.polished.fasta
    type: fasta
    description: Racon-polished consensus assembly.
caveats:
  - LLM outputs are suggestions, not biological, clinical, regulatory, or diagnostic conclusions.
  - Not a clinical metagenomics workflow and not designed for raw POD5 methylation-aware processing.
  - Documentation is example-driven around a Klebsiella pneumoniae KPC study; downstream AMR/plasmid detail lives in the accompanying notebook (see needs_review).
  - Guppy and R9.4.1 chemistry are legacy/deprecated upstream (replaced by Dorado on R10.4.1); reproduce only for matching legacy data.
failure_modes:
  - symptom: Guppy not found / cannot basecall.
    cause: Guppy is distributed by ONT (login) and not on PATH; it is deprecated upstream.
    mitigation: Use the FASTQ entry point, or basecall externally; for new R10.4.1 data use a Dorado-based skill.
source_files:
  - Clinical_Isolates_and_Plasmid_Profiling/AMR_nanopore/README.md
  - Clinical_Isolates_and_Plasmid_Profiling/AMR_nanopore/run_pipeline.sh
  - Clinical_Isolates_and_Plasmid_Profiling/AMR_nanopore/Klebsiella_pneumoniae_KPC_analysis.ipynb
  - MANUAL_EXECUTION_GUIDE.md
  - environment.yaml
external_references:
  - label: EPI2ME wf-bacterial-genomes
    url: https://github.com/epi2me-labs/wf-bacterial-genomes
    note: Upstream isolate assembly + AMR (Flye/Medaka, ResFinder, MOB-suite, MLST). Comparison only.
  - label: ONT Dorado
    url: https://github.com/nanoporetech/dorado
    note: Current basecaller replacing Guppy.
external_reference_notes: >-
  pipelines.json records Guppy dna_r9.4.1_450bps_hac for this workflow, matching
  the README; this is legacy R9.4.1 chemistry. Upstream wf-bacterial-genomes uses
  Medaka polishing and bundles ResFinder/MOB-suite/MLST; the local workflow stops
  at Racon polishing in its README. Differences are not reconciled into the local
  commands; local README remains source of truth.
needs_review:
  - "AMR_nanopore/README.md shows `flye --nano-corr` while run_pipeline.sh uses `flye --nano-hq`; templates use the wrapper's --nano-hq. Reconcile intended Flye read mode."
  - "AMR/plasmid detection (e.g. AMRFinderPlus, MOB-suite) for this isolate workflow is not given as explicit commands in the AMR_nanopore directory README; it is documented in Klebsiella_pneumoniae_KPC_analysis.ipynb (not parsed here) and in the combined AMR Nanopore & CRE block of MANUAL_EXECUTION_GUIDE.md (which uses Dorado, i.e. the CRE workflow). Add AMR/MOB command templates only after confirming them from the notebook."
