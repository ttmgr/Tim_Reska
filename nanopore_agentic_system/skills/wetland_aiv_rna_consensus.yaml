name: wetland_aiv_rna_consensus
display_name: Wetland Health - AIV RNA Consensus (Track 2)
domain: Environmental Metagenomics
description: >-
  Avian Influenza Virus (AIV) whole-genome consensus branch of the Wetland Health
  study, for AIV-positive RNA samples. Basecall RNA004, quality-filter (Filtlong
  Q>=8, len>=150), then per-segment (PB2 PB1 PA HA NA NP M NS): map to an AIV
  segment reference with Minimap2, pick the best reference by idxstats, call
  variants with Clair3, build a zero-coverage mask with samtools depth, and
  generate a masked consensus with BCFtools. Route here for targeted AIV genome
  reconstruction from wetland RNA (use the viral metagenomics branch for
  untargeted virome discovery).
supported_input_types:
  - pod5
  - fastq
tools:
  - name: dorado
    version: "manual install"
    purpose: RNA004 basecalling.
    url: https://github.com/nanoporetech/dorado
  - name: filtlong
    version: ">=0.2.1"
    purpose: Quality/length read filtering.
    url: https://github.com/rrwick/Filtlong
  - name: minimap2
    version: "2.28"
    purpose: Read alignment to AIV segment references.
    url: https://github.com/lh3/minimap2
  - name: samtools
    version: "1.17/1.19"
    purpose: BAM sort/index, idxstats, faidx, depth.
    url: https://github.com/samtools/samtools
  - name: run_clair3.sh
    version: "Clair3 (separate env), model r1041_e82_400bps_sup_v500"
    purpose: Variant calling.
    url: https://github.com/HKU-BAL/Clair3
  - name: bcftools
    version: "1.17/1.19"
    purpose: VCF view/index and masked consensus generation.
    url: https://github.com/samtools/bcftools
required_databases:
  - name: AIV segment reference database
    note: Per-segment FASTA (e.g. NCBI Influenza European sequences); user-provided.
  - name: Clair3 model
    note: ONT model directory (r1041_e82_400bps_sup_v500 in the script).
parameters:
  - name: pod5_dir
    required: true
    description: POD5 directory (basecalling entry).
  - name: rna_model
    required: false
    default: rna004_130bps_sup_v5.0.0
    description: Dorado RNA model (verbatim from virus_analysis_pipeline.md).
  - name: reads_fastq
    required: true
    description: Basecalled reads FASTQ.
  - name: out_dir
    required: true
    description: Output directory.
  - name: filtered_fastq
    required: true
    description: Filtlong-filtered reads.
  - name: segment_reference
    required: true
    description: FASTA reference for the current segment.
  - name: clair3_model
    required: true
    description: Clair3 ONT model path.
  - name: best_reference
    required: true
    description: Best-matching reference contig name (from idxstats).
pre_hooks:
  - "preflight.check_file_exists(segment_reference)"
  - "preflight.check_dir_exists(clair3_model)"
  - "preflight.check_command_available('minimap2')"
  - "preflight.check_command_available('bcftools')"
command_templates:
  - id: basecall_rna
    description: Basecall RNA004 to FASTQ.
    template: |-
      dorado basecaller {rna_model} {pod5_dir} --emit-fastq > {reads_fastq}
    source: Environmental_Metagenomics/Wetland_Health/virus_analysis_pipeline.md
  - id: filter_reads
    description: Quality/length filter (Q>=8, len>=150).
    template: |-
      filtlong --min_mean_q 8 --min_length 150 {reads_fastq} > {filtered_fastq}
    source: Environmental_Metagenomics/Wetland_Health/virus_analysis_pipeline.md
  - id: map_segment
    description: Map filtered reads to a segment reference, sort and index.
    template: |-
      minimap2 -ax map-ont {segment_reference} {filtered_fastq} | samtools view -b -o {out_dir}/mapped.bam - && samtools sort -o {out_dir}/mapped_sorted.bam {out_dir}/mapped.bam && samtools index {out_dir}/mapped_sorted.bam
    source: Environmental_Metagenomics/Wetland_Health/virus_analysis_pipeline.md
  - id: best_reference
    description: Identify the best-covered reference contig.
    template: |-
      samtools idxstats {out_dir}/mapped_sorted.bam > {out_dir}/idxstats.txt
    source: Environmental_Metagenomics/Wetland_Health/virus_analysis_pipeline.md
  - id: extract_best_reference
    description: Extract the best reference FASTA and subset/sort the BAM.
    template: |-
      samtools faidx {segment_reference} {best_reference} > {out_dir}/best_reference.fasta && samtools faidx {out_dir}/best_reference.fasta && samtools view -b -o {out_dir}/best_ref.bam {out_dir}/mapped_sorted.bam {best_reference} && samtools sort -o {out_dir}/best_ref_sorted.bam {out_dir}/best_ref.bam && samtools index {out_dir}/best_ref_sorted.bam
    source: Environmental_Metagenomics/Wetland_Health/virus_analysis_pipeline.md
  - id: call_variants_clair3
    description: Call variants with Clair3 (low AF thresholds).
    template: |-
      run_clair3.sh --bam_fn={out_dir}/best_ref_sorted.bam --ref_fn={out_dir}/best_reference.fasta --threads=8 --platform=ont --snp_min_af=0.01 --indel_min_af=0.01 --model_path={clair3_model} --output={out_dir}/clair3 --include_all_ctgs
    source: Environmental_Metagenomics/Wetland_Health/virus_analysis_pipeline.md
  - id: normalize_vcf
    description: Export, compress and index the Clair3 VCF.
    template: |-
      bcftools view {out_dir}/clair3/merge_output.vcf.gz > {out_dir}/variants.vcf && bgzip -c {out_dir}/variants.vcf > {out_dir}/variants.vcf.gz && bcftools index {out_dir}/variants.vcf.gz
    source: Environmental_Metagenomics/Wetland_Health/virus_analysis_pipeline.md
  - id: zero_coverage_mask
    description: Build a BED of zero-coverage positions for masking.
    template: |-
      samtools depth -a {out_dir}/best_ref_sorted.bam | awk '$3==0 {{ printf "%s\t%d\t%d\n", $1, $2-1, $2 }}' > {out_dir}/zero_coverage.bed
    source: Environmental_Metagenomics/Wetland_Health/virus_analysis_pipeline.md
  - id: consensus
    description: Build a consensus masking only zero-depth sites to N.
    template: |-
      bcftools consensus --mask {out_dir}/zero_coverage.bed --fasta-ref {out_dir}/best_reference.fasta -o {out_dir}/consensus.fasta {out_dir}/variants.vcf.gz
    source: Environmental_Metagenomics/Wetland_Health/virus_analysis_pipeline.md
post_hooks:
  - "parsers.parse_generic_tsv(idxstats_txt)"
  - "parsers.parse_vcf(variants_vcf)"
validation_hooks:
  - "validation.unexpected_empty_output(path=consensus_fasta)"
  - "validation.low_read_yield(n_reads=n_reads)"
outputs:
  - name: consensus.fasta
    type: fasta
    description: Per-segment masked consensus (concatenated across 8 segments).
  - name: variants.vcf.gz
    type: vcf
    description: Clair3 variant calls per segment.
caveats:
  - LLM outputs are suggestions, not biological, clinical, regulatory, or diagnostic conclusions.
  - Only AIV-positive samples proceed to consensus generation; segments with no/low coverage are skipped or N-masked.
  - The published script is a per-segment loop over PB2 PB1 PA HA NA NP M NS with hardcoded DB and Clair3 model paths to edit.
failure_modes:
  - symptom: Segment skipped / no consensus.
    cause: No reads mapped or only secondary/supplementary alignments for that segment.
    mitigation: Confirm coverage; the script skips segments with zero mapped or zero primary reads by design.
source_files:
  - Environmental_Metagenomics/Wetland_Health/virus_analysis_pipeline.md
  - Environmental_Metagenomics/Wetland_Health/aiv_rna_analysis_pipeline.md
  - Environmental_Metagenomics/Wetland_Health/README.md
  - MANUAL_EXECUTION_GUIDE.md
external_references:
  - label: EPI2ME wf-flu
    url: https://github.com/epi2me-labs/wf-flu
    note: Upstream influenza typing/consensus (IRMA + INSaFLU). Comparison only.
external_reference_notes: >-
  Upstream wf-flu builds an IRMA consensus and types with INSaFLU; the local
  branch uses Minimap2 best-reference selection + Clair3 + BCFtools masked
  consensus per segment. Upstream is comparison only; local commands are source
  of truth.
needs_review:
  - "aiv_rna_analysis_pipeline.md is a stub that redirects to virus_analysis_pipeline.md Part A; commands here are taken from Part A verbatim."
