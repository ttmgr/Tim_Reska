name: cre_plasmid_clustering
display_name: CRE Plasmid Clustering
domain: Clinical Isolates & Plasmid Profiling
description: >-
  Plasmid-focused characterization and relatedness analysis for carbapenem-resistant
  Enterobacterales (CRE) isolates sequenced with RBK114.24 on R10.4.1. From raw
  POD5 or basecalled FASTQ: Dorado basecalling/demux, Porechop + NanoFilt cleaning,
  Flye assembly, Medaka --bacteria polishing, depth estimation, MOB-suite plasmid
  typing, AMRFinderPlus, then Mash distances and Pling DCJ clustering. A SLURM
  master script (run_full_pipeline.sh) extends this with Rasusa downsampling,
  CheckM2, carbapenemase summaries, taxonomy/MLST, and multi-coverage analysis.
supported_input_types:
  - pod5
  - fastq
tools:
  - name: dorado
    version: "v5.0 (manual install)"
    purpose: Basecalling (SUP) and demultiplexing.
    url: https://github.com/nanoporetech/dorado
  - name: porechop
    version: "0.2.3"
    purpose: Adapter trimming.
    url: https://github.com/rrwick/Porechop
  - name: NanoFilt
    version: "2.8.0"
    purpose: Quality and length filtering.
    url: https://github.com/wdecoster/nanofilt
  - name: seqkit
    version: "2.10.0"
    purpose: Read statistics.
    url: https://github.com/shenwei356/seqkit
  - name: flye
    version: "2.9.5"
    purpose: De novo isolate assembly (--genome-size 5m).
    url: https://github.com/mikolmogorov/Flye
  - name: medaka_consensus
    version: "ont-medaka 2.0.1"
    purpose: Consensus polishing with the --bacteria model.
    url: https://github.com/nanoporetech/medaka
  - name: minimap2
    version: "2.2.9"
    purpose: Depth-estimation alignment.
    url: https://github.com/lh3/minimap2
  - name: samtools
    version: "1.16.1"
    purpose: BAM sort/index/depth.
    url: https://github.com/samtools/samtools
  - name: mob_recon
    version: "mob-suite 3.1.8"
    purpose: Plasmid reconstruction and replicon typing.
    url: https://github.com/phac-nml/mob-suite
  - name: amrfinder
    version: "ncbi-amrfinderplus 4.0.3"
    purpose: AMR gene detection (--plus).
    url: https://github.com/ncbi/amr
  - name: mash
    version: "2.3"
    purpose: MinHash pairwise plasmid distances.
    url: https://github.com/marbl/Mash
  - name: pling
    version: "1.0.1 (pip)"
    purpose: DCJ-based plasmid network clustering.
    url: https://github.com/iqbal-lab-org/pling
  - name: rasusa
    version: ">=2.0 (HPC pipeline)"
    purpose: Read downsampling to target coverage.
    url: https://github.com/mbhall88/rasusa
  - name: checkm2
    version: ">=1.0 (HPC pipeline, separate env)"
    purpose: Genome completeness/contamination QC.
    url: https://github.com/chklovski/CheckM2
required_databases:
  - name: AMRFinderPlus database
    note: Installed/updated via `amrfinder --update`.
  - name: CheckM2 database
    note: Required only for the HPC run_full_pipeline.sh CheckM2 step (--checkm2-db).
  - name: GTDB-Tk database
    note: Optional, only when --run-gtdb is set in run_full_pipeline.sh.
parameters:
  - name: pod5_dir
    required: true
    description: Raw POD5 input directory (basecalling entry).
  - name: dorado_model
    required: false
    default: dna_r10.4.1_e8.2_400bps_sup@v5.0.0
    description: Dorado SUP model for R10.4.1 (verbatim from README).
  - name: kit
    required: false
    default: SQK-RBK114-24
    description: RBK114.24 sequencing kit.
  - name: out_dir
    required: true
    description: Project output directory.
  - name: basecalled_fastq
    required: true
    description: Basecalled FASTQ output.
  - name: demux_dir
    required: true
    description: Per-barcode FASTQ directory.
  - name: reads_fastq
    required: true
    description: A per-barcode FASTQ entering trimming/filtering.
  - name: trimmed_fastq
    required: true
    description: Porechop output.
  - name: filtered_fastq
    required: true
    description: NanoFilt output.
  - name: min_q
    required: false
    default: 8
    description: NanoFilt minimum quality (verbatim from run_pipeline.sh, QMIN).
  - name: min_len
    required: false
    default: 200
    description: NanoFilt minimum length (verbatim, LMIN).
  - name: genome_size
    required: false
    default: 5m
    description: Flye --genome-size (README note - may be unnecessary in newer Flye).
  - name: threads
    required: false
    default: 8
    description: CPU threads.
  - name: flye_out_dir
    required: true
    description: Flye output directory.
  - name: assembly_fasta
    required: true
    description: Flye assembly.fasta.
  - name: medaka_out_dir
    required: true
    description: Medaka output directory (produces consensus.fasta).
  - name: consensus_fasta
    required: true
    description: Medaka consensus.fasta (input to MOB-suite/AMRFinder).
  - name: mob_out_dir
    required: true
    description: MOB-suite output directory.
  - name: amr_out
    required: true
    description: AMRFinder output table path.
  - name: plasmid_a
    required: true
    description: First plasmid FASTA for a Mash pairwise comparison.
  - name: plasmid_b
    required: true
    description: Second plasmid FASTA for a Mash pairwise comparison.
  - name: mash_out
    required: true
    description: Mash distances output.
  - name: plasmid_list
    required: true
    description: Sourmash/Pling plasmid list input (e.g. plasmid.txt).
  - name: pling_out_dir
    required: true
    description: Pling output directory.
  - name: containment_distance
    required: false
    default: "0.3"
    description: Pling --containment_distance (verbatim from README/manual guide).
  - name: cores
    required: false
    default: 8
    description: Pling --cores.
pre_hooks:
  - "preflight.check_dir_exists(pod5_dir)"
  - "preflight.check_command_available('dorado')"
  - "preflight.check_command_available('flye')"
  - "preflight.check_command_available('medaka_consensus')"
  - "preflight.check_command_available('mob_recon')"
  - "preflight.check_command_available('amrfinder')"
  - "preflight.check_any_command_available(['mash'])"
  - "preflight.check_any_command_available(['pling'])"
command_templates:
  - id: basecall
    description: Basecall POD5 to FASTQ (Dorado SUP, no trim).
    template: |-
      dorado basecaller {dorado_model} {pod5_dir} --emit-fastq --kit-name {kit} -r --no-trim > {basecalled_fastq}
    source: Clinical_Isolates_and_Plasmid_Profiling/CRE-Plasmid-clustering/README.md
  - id: demux
    description: Demultiplex basecalled FASTQ into per-barcode files.
    template: |-
      dorado demux --output-dir {demux_dir} --emit-fastq --kit-name {kit} {basecalled_fastq}
    source: Clinical_Isolates_and_Plasmid_Profiling/CRE-Plasmid-clustering/README.md
  - id: porechop
    description: Trim adapters.
    template: |-
      porechop -i {reads_fastq} -o {trimmed_fastq}
    source: Clinical_Isolates_and_Plasmid_Profiling/CRE-Plasmid-clustering/run_pipeline.sh
  - id: nanofilt
    description: Quality and length filter.
    template: |-
      NanoFilt -q {min_q} -l {min_len} < {trimmed_fastq} > {filtered_fastq}
    source: Clinical_Isolates_and_Plasmid_Profiling/CRE-Plasmid-clustering/README.md
  - id: seqkit_stats
    description: Read statistics for the filtered reads.
    template: |-
      seqkit stats -T -a {filtered_fastq}
    source: Clinical_Isolates_and_Plasmid_Profiling/CRE-Plasmid-clustering/README.md
  - id: assembly_flye
    description: De novo isolate assembly.
    template: |-
      flye --nano-hq {filtered_fastq} --out-dir {flye_out_dir} --genome-size {genome_size} --threads {threads}
    source: Clinical_Isolates_and_Plasmid_Profiling/CRE-Plasmid-clustering/README.md
  - id: polish_medaka
    description: Polish with Medaka bacterial model.
    template: |-
      medaka_consensus -i {filtered_fastq} -d {assembly_fasta} -o {medaka_out_dir} -t {threads} --bacteria
    source: Clinical_Isolates_and_Plasmid_Profiling/CRE-Plasmid-clustering/README.md
  - id: depth_estimation
    description: Estimate depth by aligning reads to the assembly.
    template: |-
      minimap2 -ax map-ont {assembly_fasta} {filtered_fastq} -t {threads} | samtools view -b - | samtools sort -@ {threads} -o {out_dir}/coverage.bam - && samtools index {out_dir}/coverage.bam && samtools depth {out_dir}/coverage.bam > {out_dir}/depth.txt
    source: Clinical_Isolates_and_Plasmid_Profiling/CRE-Plasmid-clustering/README.md
  - id: mob_recon
    description: Reconstruct and type plasmids on the polished assembly.
    template: |-
      mob_recon --infile {consensus_fasta} --outdir {mob_out_dir}
    source: Clinical_Isolates_and_Plasmid_Profiling/CRE-Plasmid-clustering/README.md
  - id: amrfinder
    description: Detect AMR genes on the polished assembly.
    template: |-
      amrfinder -n {consensus_fasta} -o {amr_out} --threads {threads} --plus
    source: Clinical_Isolates_and_Plasmid_Profiling/CRE-Plasmid-clustering/README.md
  - id: mash_dist
    description: Pairwise plasmid distance (run across pairs of interest).
    template: |-
      mash dist {plasmid_a} {plasmid_b} > {mash_out}
    source: Clinical_Isolates_and_Plasmid_Profiling/CRE-Plasmid-clustering/README.md
  - id: pling_cluster
    description: DCJ-based plasmid clustering after pre-selecting pairs below threshold.
    template: |-
      pling align --containment_distance {containment_distance} --cores {cores} --sourmash {plasmid_list} {pling_out_dir}
    source: Clinical_Isolates_and_Plasmid_Profiling/CRE-Plasmid-clustering/README.md
post_hooks:
  - "parsers.parse_amrfinder_table(amr_out)"
  - "parsers.parse_generic_tsv(mob_out_dir + '/contig_report.txt')"
  - "parsers.parse_generic_tsv(mash_out)"
validation_hooks:
  - "validation.unexpected_empty_output(path=consensus_fasta)"
  - "validation.missing_amr_hits(n_hits)"
  - "validation.database_not_detected(path=checkm2_db)"
outputs:
  - name: consensus.fasta
    type: fasta
    description: Medaka-polished assembly per barcode.
  - name: contig_report.txt
    type: txt
    description: MOB-suite plasmid/chromosome typing report.
  - name: "<barcode>.amr.txt"
    type: tsv
    description: AMRFinderPlus AMR/virulence table.
  - name: "mash_<type>.txt"
    type: txt
    description: Mash pairwise plasmid distances.
  - name: pling_out
    type: directory
    description: Pling DCJ plasmid network/clusters.
caveats:
  - LLM outputs are suggestions, not biological, clinical, regulatory, or diagnostic conclusions.
  - Focused on isolate-scale plasmid reconstruction and clustering; not a general metagenomic surveillance workflow.
  - Medaka v2+ with --bacteria is required; versions below v2 did not reliably improve assembly quality.
  - SNP analysis, species ID and MLST are done externally (Pathogenwatch/PubMLST) in the local pipeline; the HPC script automates MLST/GTDB-Tk.
failure_modes:
  - symptom: Flye assembles poorly or fails.
    cause: Duplicated read IDs after concatenating barcodes.
    mitigation: Remove duplicate reads before assembly (README note).
  - symptom: run_full_pipeline.sh aborts at validation.
    cause: Helper scripts (build_carbapenemase_summary.py, analyze_coverage_publication_fixed.py, run_mash_then_pling_by_group_v2.slurm, taxonomy scripts) not present alongside it, or CheckM2/GTDB-Tk DB missing.
    mitigation: Provide the helper scripts and database paths, or use --skip-* flags.
source_files:
  - Clinical_Isolates_and_Plasmid_Profiling/CRE-Plasmid-clustering/README.md
  - Clinical_Isolates_and_Plasmid_Profiling/CRE-Plasmid-clustering/run_pipeline.sh
  - Clinical_Isolates_and_Plasmid_Profiling/CRE-Plasmid-clustering/run_full_pipeline.sh
  - Clinical_Isolates_and_Plasmid_Profiling/CRE-Plasmid-clustering/env/environment.yaml
  - MANUAL_EXECUTION_GUIDE.md
external_references:
  - label: EPI2ME wf-bacterial-genomes
    url: https://github.com/epi2me-labs/wf-bacterial-genomes
    note: Upstream isolate assembly + ResFinder + MOB-suite plasmid ID + MLST. Comparison only.
  - label: EPI2ME wf-clone-validation
    url: https://github.com/epi2me-labs/wf-clone-validation
    note: Upstream de novo plasmid reconstruction (cloning validation). Comparison only.
  - label: ONT Medaka
    url: https://github.com/nanoporetech/medaka
    note: --bacteria polishing model reference.
external_reference_notes: >-
  Upstream wf-bacterial-genomes bundles ResFinder/PointFinder for AMR and Sourmash
  for taxonomy and uses Medaka auto-model selection; the local pipeline uses
  AMRFinderPlus and an explicit Medaka --bacteria model
  (r1041_e82_400bps_bacterial_methylation in the HPC script). Upstream defaults are
  not back-ported; local commands remain source of truth. wf-clone-validation is a
  cloning-validation plasmid assembler, not a CRE relatedness tool - referenced for
  design comparison only.
needs_review:
  - "Flye --genome-size 5m is included per README, which notes it may be unnecessary in newer Flye versions."
  - "HPC run_full_pipeline.sh references helper scripts not present in this directory listing (build_carbapenemase_summary.py, analyze_coverage_publication_fixed.py, run_mash_then_pling_by_group_v2.slurm, run_taxonomy_mlst_*.sh); confirm availability before HPC execution."
