# filters.yml — disease-specific code definitions reused across data sources.
# Used by harmonizer.py for event classification and cross-cohort comparability.

type2_diabetes:
  label: "Type 2 Diabetes Mellitus"
  icd10:
    - E11    # Type 2 diabetes mellitus (full chapter)
    - E11.0  # with hyperosmolarity
    - E11.1  # with ketoacidosis
    - E11.2  # with kidney complications
    - E11.3  # with ophthalmic complications
    - E11.4  # with neurological complications
    - E11.5  # with circulatory complications
    - E11.6  # with other specified complications
    - E11.7  # with multiple complications
    - E11.8  # with unspecified complications
    - E11.9  # without complications
  icd9:
    - "250.00"
    - "250.02"
    - "250.10"
    - "250.12"
    - "250.20"
    - "250.22"
    - "250.30"
    - "250.32"
    - "250.40"
    - "250.42"
    - "250.50"
    - "250.52"
    - "250.60"
    - "250.62"
    - "250.70"
    - "250.72"
    - "250.80"
    - "250.82"
    - "250.90"
    - "250.92"
  nhanes_variable: DIQ010   # value=1 means doctor-told diabetes
  snomed:
    - "44054006"   # Type 2 diabetes mellitus

type1_diabetes:
  label: "Type 1 Diabetes Mellitus"
  icd10:
    - E10
  icd9:
    - "250.01"
    - "250.03"
    - "250.11"
    - "250.13"
  snomed:
    - "46635009"

hypertension:
  label: "Essential Hypertension"
  icd10:
    - I10
    - I11    # hypertensive heart disease
    - I12    # hypertensive chronic kidney disease
    - I13    # hypertensive heart and chronic kidney disease
  icd9:
    - "401"
    - "401.0"
    - "401.1"
    - "401.9"
    - "402"
    - "403"
    - "404"
  nhanes_variable: BPQ020   # value=1 means ever told high blood pressure
  snomed:
    - "59621000"   # Essential hypertension

diabetic_kidney_disease:
  label: "Diabetic Kidney Disease / Nephropathy"
  icd10:
    - E11.2   # T2DM with kidney complications
    - N08     # glomerular disorders in diseases classified elsewhere
    - E10.2   # T1DM with kidney complications
  icd9:
    - "250.40"
    - "250.41"
    - "250.42"
    - "250.43"
  snomed:
    - "127013003"  # Diabetic renal disease

diabetic_retinopathy:
  label: "Diabetic Retinopathy"
  icd10:
    - E11.3   # T2DM with ophthalmic complications
    - H36.0   # diabetic retinopathy
    - E10.3   # T1DM with ophthalmic complications
  icd9:
    - "250.50"
    - "250.51"
    - "250.52"
    - "250.53"
  snomed:
    - "4855003"    # Diabetic retinopathy

myocardial_infarction:
  label: "Myocardial Infarction"
  icd10:
    - I21
    - I22
  icd9:
    - "410"
    - "410.0"
    - "410.1"
    - "410.2"
    - "410.3"
    - "410.4"
    - "410.5"
    - "410.6"
    - "410.7"
    - "410.8"
    - "410.9"
  snomed:
    - "22298006"

heart_failure:
  label: "Heart Failure"
  icd10:
    - I50
    - I50.0
    - I50.1
    - I50.9
  icd9:
    - "428"
    - "428.0"
    - "428.1"
    - "428.2"
    - "428.3"
    - "428.4"
    - "428.9"
  snomed:
    - "84114007"

stroke:
  label: "Ischaemic Stroke"
  icd10:
    - I63
  icd9:
    - "434"
    - "434.0"
    - "434.1"
    - "434.9"
  snomed:
    - "422504002"

chronic_kidney_disease:
  label: "Chronic Kidney Disease"
  icd10:
    - N18
    - N18.1
    - N18.2
    - N18.3
    - N18.4
    - N18.5
    - N18.6
    - N18.9
  icd9:
    - "585"
    - "585.1"
    - "585.2"
    - "585.3"
    - "585.4"
    - "585.5"
    - "585.6"
    - "585.9"
  snomed:
    - "709044004"

death:
  label: "All-cause mortality"
  icd10:
    - Z00-Z99   # use cause-of-death registry codes
  # handled specially in adapters via death date fields rather than diagnosis codes
