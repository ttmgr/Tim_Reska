# MedRisk-ADH default experiment configuration

cohort:
  patients_per_market: 5000
  markets: ["DE", "ES", "FR", "INT"]
  random_seed: 42

models:
  xgboost:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    eval_metric: "logloss"
  cox_ph:
    penalizer: 0.01
    l1_ratio: 0.0
  multistate:
    max_iter: 500
    tolerance: 1.0e-6

validation:
  dqs_weights:
    completeness: 0.40
    consistency: 0.35
    recency: 0.25
  dqs_thresholds:
    adequate: 0.80
    caution: 0.60
  recency_half_life_years: 1.4
  pbw:
    confidence_threshold: 0.80
    dqs_threshold: 0.60
  ccm_threshold: 0.20
  epu_decile_threshold: 3

reporting:
  output_dir: "data/reports"
  include_shap: true
  include_progression_curves: true

split:
  train: 0.80
  validation: 0.10
  test: 0.10
  stratify_by: "event_occurred"

# --- v2 additions ---

router:
  lab_threshold: 0.3
  med_threshold: 0.3
  val_fraction: 0.15

reliability_head:
  cost_fp: 1.0
  cost_fn: 5.0
  cost_review: 0.5

governance:
  audit_dir: "data/audit"
  model_version: "v2.0.0"

shift_detection:
  psi_threshold: 0.20
  js_divergence_threshold: 0.10
