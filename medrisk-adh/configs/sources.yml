# sources.yml — repository connection parameters and authentication method for each data source.
# Auth methods: "none" | "env_var_token" | "app_token" | "local_path"

nhanes:
  base_url: "https://wwwn.cdc.gov/nchs/nhanes"
  auth: none
  description: "NHANES — US National Health and Nutrition Examination Survey"

cdc_places:
  base_url: "https://chronicdata.cdc.gov/resource"
  auth: app_token
  app_token_env: SOCRATA_APP_TOKEN
  description: "CDC PLACES — model-based small-area chronic disease estimates"

data_gov:
  catalog_url: "https://catalog.data.gov/api/3/action/package_search"
  auth: app_token
  app_token_env: SOCRATA_APP_TOKEN
  description: "data.gov — US open data catalog (chronic disease datasets)"
  # Whitelisted dataset IDs known to be stable and well-structured
  whitelist:
    - "diabetes-hypertension-comorbidity"

zenodo:
  api_base: "https://zenodo.org/api"
  auth: env_var_token
  token_env: ZENODO_TOKEN
  description: "Zenodo — general-purpose research data repository"

t1_granada:
  zenodo_record_id: "8386456"
  auth: env_var_token
  token_env: ZENODO_TOKEN
  description: "T1DiabetesGranada — longitudinal multi-modal type 1 diabetes dataset (Zenodo)"

glucose_ml:
  catalog_file: "configs/glucose_ml_catalog.yml"
  auth: none
  description: "Glucose-ML — curated collection of 10 longitudinal CGM datasets"

uk_biobank:
  auth: local_path
  data_path_env: UKB_DATA_PATH
  description: "UK Biobank — controlled-access prospective cohort (500K participants)"

biolincc:
  catalog_url: "https://biolincc.nhlbi.nih.gov"
  auth: local_path
  data_path_env: BIOLINCC_DATA_PATH
  description: "NHLBI BioLINCC — landmark cardiovascular and metabolic cohort studies"
